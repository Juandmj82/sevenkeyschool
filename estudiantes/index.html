<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Estudiantes — Seven Keys School</title>
  <link rel="stylesheet" href="css/tutoriales.css">
  <!-- FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <header id="main-header">
    <div style="display: flex; align-items: center; gap: 15px;">
      <img src="../img/logo.png" alt="Seven Keys School" class="header-logo">
    </div>
    <a href="../juegos/index.html" class="btn-back">
      <i class="fas fa-arrow-left"></i> Volver a Juegos
    </a>
  </header>

  <main class="portal-container">
    <!-- 1. Authentication View -->
    <div id="auth-view" class="auth-wrapper">
      <div class="auth-card">
        <h1 class="auth-title">Portal de Estudio</h1>
        <p class="auth-subtitle">Ingresa tus credenciales autorizadas por la escuela para acceder a tus videos.</p>
        
        <div class="form-group">
          <label class="form-label" for="login-email">Correo Electrónico</label>
          <input class="form-input" type="email" id="login-email" placeholder="ejemplo@correo.com">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="login-password">Contraseña / Código</label>
          <input class="form-input" type="password" id="login-password" placeholder="••••••••">
        </div>

        <button class="btn-primary" onclick="handleLogin()">
          <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
        </button>
      </div>
    </div>

    <!-- 2. Dashboard View -->
    <div id="dashboard-view" style="display: none; flex-direction: column; gap: 1.5rem;">
      <!-- Profile Header Centered -->
      <div class="profile-section-centered">
        <div class="avatar-container-large">
          <img src="../img/profe.jpg" alt="Avatar" id="student-avatar" class="student-avatar-img-large">
          <label for="avatar-upload" style="position: absolute; bottom: 0; right: 0; background: var(--accent-gold); color: #000; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; cursor: pointer; border: 2px solid #fff;">
            <i class="fas fa-camera"></i>
          </label>
          <input type="file" id="avatar-upload" accept="image/*" style="display: none;" onchange="uploadAvatar()">
        </div>
        
        <div>
          <h1 class="student-name-text-large">
            <span id="student-name">Cargando...</span>
            <button onclick="editName()" style="background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem;"><i class="fas fa-edit"></i></button>
          </h1>
          <span id="student-instrument" class="student-instrument-badge">Instrumento</span>
        </div>
        
        <div class="profile-actions-bar">
          <button class="btn-back" style="font-size: 0.75rem; padding: 0.4rem 0.8rem;" onclick="togglePasswordForm()">
            <i class="fas fa-key"></i> Contraseña
          </button>
          <button class="btn-logout" onclick="handleLogout()">
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
          </button>
        </div>
      </div>

      <!-- Password Change form (Hidden by default) -->
      <div id="password-form-section" style="display: none; background: var(--bg-card); border: 1px solid var(--accent-gold); padding: 1.2rem; border-radius: 16px; flex-direction: column; gap: 0.8rem;">
        <h3 style="font-family: var(--font-family); font-size: 1rem; color: var(--accent-gold); font-weight: 700;">Cambiar Contraseña</h3>
        <div class="form-group">
          <label class="form-label">Nueva Contraseña</label>
          <input class="form-input" type="password" id="new-password" placeholder="Mínimo 6 caracteres">
        </div>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
          <button class="btn-back" style="font-size: 0.75rem;" onclick="togglePasswordForm()">Cancelar</button>
          <button class="btn-save-note" style="align-self: auto;" onclick="updatePassword()">Guardar Contraseña</button>
        </div>
      </div>

      <!-- Teacher Juan Di quote dynamic header -->
      <div class="teacher-banner">
        <img src="../img/profe.jpg" alt="Teacher Juan Di" class="teacher-avatar">
        <div class="teacher-bubble">
          <div class="teacher-title">Teacher Juan Di dice:</div>
          <div id="teacher-quote" class="teacher-quote">"La constancia en la práctica diaria es la llave para dominar tu instrumento."</div>
        </div>
      </div>

      <!-- Navigation Tabs -->
      <div class="portal-tabs">
        <button id="tab-classes" class="portal-tab-btn active" onclick="switchTab('classes')">
          <i class="fas fa-calendar-alt"></i> Clases Tomadas
        </button>
        <button id="tab-videos" class="portal-tab-btn" onclick="switchTab('videos')">
          <i class="fas fa-video"></i> Tutoriales y Material
        </button>
      </div>

      <!-- Tab Content 1: Clases Tomadas -->
      <div id="tab-classes-content" class="history-container" style="display: flex;">
        <!-- Dynamic classes history list -->
      </div>

      <!-- Tab Content 2: Tutoriales -->
      <div id="tab-videos-content" class="videos-container" style="display: none;">
        <div id="videos-list" class="videos-container">
          <!-- Videos will be dynamically rendered here -->
        </div>
      </div>
    </div>
  </main>

  <div id="toast" class="toast-msg">Mensaje informativo</div>

  <script>
    // Configuración real del proyecto de la escuela
    const SUPABASE_URL = "https://iqknbmwdgqbfnhrdcnbl.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlxa25ibXdkZ3FiZm5ocmRjbmJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNjg1NjAsImV4cCI6MjA5ODc0NDU2MH0.Usqt87i8Xxahu5ocZWKWibEd17axb7Rg1JnBx5ik43w";
    let supabaseClient = null;
    let currentUser = null;
    let studentProfile = null;

    const MOTIVATIONAL_QUOTES = [
      "\"La práctica no hace la perfección, la práctica hace al maestro.\"",
      "\"Cada 10 minutos de estudio enfocado te acercan un paso más a la maestría musical.\"",
      "\"Aprender un instrumento es un viaje de paciencia. Disfruta el sonido de cada nota hoy.\"",
      "\"Tu instrumento es tu voz. Practica con calma y escucha lo que tienes para decir.\"",
      "\"La música requiere corazón y disciplina. ¡Buen trabajo por dedicarle tiempo hoy!\""
    ];

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.innerText = msg;
      toast.style.display = 'block';
      setTimeout(() => {
        toast.style.display = 'none';
      }, 3000);
    }

    function initSupabase() {
      if (SUPABASE_URL && SUPABASE_KEY) {
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        // Check current active session
        supabaseClient.auth.onAuthStateChange((event, session) => {
          if (session) {
            loadStudentDashboard(session.user);
          } else {
            showAuthView();
          }
        });
      }
    }

    function showAuthView() {
      document.getElementById('auth-view').style.display = 'flex';
      document.getElementById('dashboard-view').style.display = 'none';
    }

    function switchTab(tabName) {
      if (tabName === 'classes') {
        document.getElementById('tab-classes').classList.add('active');
        document.getElementById('tab-videos').classList.remove('active');
        document.getElementById('tab-classes-content').style.display = 'flex';
        document.getElementById('tab-videos-content').style.display = 'none';
      } else {
        document.getElementById('tab-classes').classList.remove('active');
        document.getElementById('tab-videos').classList.add('active');
        document.getElementById('tab-classes-content').style.display = 'none';
        document.getElementById('tab-videos-content').style.display = 'flex';
      }
    }

    async function loadStudentDashboard(user) {
      currentUser = user;
      document.getElementById('auth-view').style.display = 'none';
      document.getElementById('dashboard-view').style.display = 'flex';

      // Set random teacher quote
      const randQuote = MOTIVATIONAL_QUOTES[Math.floor(Math.random() * MOTIVATIONAL_QUOTES.length)];
      document.getElementById('teacher-quote').innerText = randQuote;

      try {
        // Fetch profile
        const { data: profile, error } = await supabaseClient
          .from('estudiantes')
          .select('*')
          .eq('id', user.id)
          .single();

        if (error || !profile) {
          showToast("Error al obtener perfil.");
          return;
        }

        studentProfile = profile;
        document.getElementById('student-name').innerText = profile.nombre;
        document.getElementById('student-instrument').innerText = profile.instrumento;
        if (profile.avatar_url) {
          document.getElementById('student-avatar').src = profile.avatar_url;
        }

        if (profile.estado !== 'activo') {
          showToast("Tu cuenta está inactiva. Contacta al Teacher.");
          handleLogout();
          return;
        }

        // Render Classes History
        renderClassesHistory(profile.clases_historial);

        // Fetch assigned videos for this specific student using the intermediate table
        const { data: assignedRelation, error: vErr } = await supabaseClient
          .from('estudiante_videos')
          .select('videos (*)')
          .eq('estudiante_id', user.id);

        if (vErr) {
          showToast("Error al cargar tus clases.");
          return;
        }

        // Extract and sort the videos
        const videos = assignedRelation
          .map(item => item.videos)
          .filter(Boolean)
          .sort((a, b) => a.orden - b.orden);

        renderVideos(videos);

      } catch (e) {
        console.error(e);
      }
    }

    // Helper to find and match text for creating custom PDF buttons
    function renderClassesHistory(history) {
      const container = document.getElementById('tab-classes-content');
      container.innerHTML = "";

      if (!history || history.length === 0) {
        container.innerHTML = `<p style="color: var(--text-muted); text-align: center; padding: 2rem;">No hay clases registradas en tu historial aún.</p>`;
        return;
      }

      history.forEach(item => {
        const card = document.createElement('div');
        card.className = 'history-card';
        
        let detailsHtml = "";
        item.details.forEach(line => {
          let lineHtml = line;
          
          // Match and link PDFs
          if (line.toLowerCase().includes("chaparralito")) {
            lineHtml += ` <a href="../recursos/pdf/chaparralito_llanero_guia.pdf" target="_blank" class="pdf-btn"><i class="fas fa-file-pdf"></i> Ver Guía PDF</a>`;
          } else if (line.toLowerCase().includes("martirios")) {
            lineHtml += ` <a href="../recursos/pdf/mis_martirios_guia.pdf" target="_blank" class="pdf-btn"><i class="fas fa-file-pdf"></i> Ver Guía PDF</a>`;
          }
          
          detailsHtml += `<div class="history-detail-item">${lineHtml}</div>`;
        });

        card.innerHTML = `
          <div class="history-header">
            <h3 class="history-title">${item.status} ${item.name}</h3>
            <span class="history-date"><i class="fas fa-calendar-day"></i> ${item.date}</span>
          </div>
          <div>
            ${detailsHtml}
          </div>
        `;
        container.appendChild(card);
      });
    }

    function renderVideos(videos) {
      const container = document.getElementById('videos-list');
      container.innerHTML = "";

      if (!videos || videos.length === 0) {
        container.innerHTML = `<p style="color: var(--text-muted); text-align: center; padding: 2rem;">No hay clases con tutoriales asignados aún.</p>`;
        return;
      }

      videos.forEach(video => {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
          <div class="video-player-wrapper">
            <iframe src="https://docs.google.com/viewer?srcid=${video.drive_id}&pid=explorer&efh=false&a=v&chrome=false&embedded=true" allow="autoplay" allowfullscreen></iframe>
          </div>
          <div class="video-info">
            <h3 class="video-title">${video.title}</h3>
            
            <div class="practice-note-section">
              <span class="practice-note-label">Mi Bitácora de Práctica</span>
              <textarea class="practice-note-textarea" id="note-${video.id}" placeholder="¿Qué practicaste hoy? ¿Qué te costó trabajo? Escríbelo aquí para tu bitácora..."></textarea>
              <button class="btn-save-note" onclick="savePracticeNote('${video.id}')">
                <i class="fas fa-save"></i> Guardar Nota de Estudio
              </button>
            </div>
          </div>
        `;
        container.appendChild(card);
        loadExistingNote(video.id);
      });
    }

    async function loadExistingNote(videoId) {
      if (!supabaseClient || !currentUser) return;
      const { data, error } = await supabaseClient
        .from('bitacoras')
        .select('nota')
        .eq('estudiante_id', currentUser.id)
        .eq('video_id', videoId)
        .order('fecha', { ascending: false })
        .limit(1);

      if (data && data.length > 0) {
        document.getElementById(`note-${videoId}`).value = data[0].nota;
      }
    }

    async function savePracticeNote(videoId) {
      const noteText = document.getElementById(`note-${videoId}`).value.trim();
      if (!noteText) {
        showToast("Escribe algo antes de guardar.");
        return;
      }

      try {
        const { error } = await supabaseClient
          .from('bitacoras')
          .insert({
            estudiante_id: currentUser.id,
            video_id: videoId,
            nota: noteText,
            sincronizado: false
          });

        if (error) {
          showToast("Error al guardar la nota.");
        } else {
          showToast("¡Nota de práctica guardada con éxito!");
        }
      } catch (e) {
        showToast("Error al conectar con la base de datos.");
      }
    }

    // --- Profile Editing and Photo Uploading ---
    async function editName() {
      const newName = prompt("Ingresa tu nombre completo:", studentProfile.nombre);
      if (newName && newName.trim() !== studentProfile.nombre) {
        const { error } = await supabaseClient
          .from('estudiantes')
          .update({ nombre: newName.trim() })
          .eq('id', currentUser.id);

        if (error) {
          showToast("Error al actualizar nombre.");
        } else {
          showToast("Nombre actualizado.");
          document.getElementById('student-name').innerText = newName.trim();
          studentProfile.nombre = newName.trim();
        }
      }
    }

    async function uploadAvatar() {
      const fileInput = document.getElementById('avatar-upload');
      if (fileInput.files.length === 0) return;

      const file = fileInput.files[0];
      const fileExt = file.name.split('.').pop();
      const fileName = `${currentUser.id}-${Math.random()}.${fileExt}`;
      const filePath = `${fileName}`;

      showToast("Subiendo foto de perfil...");

      const { data, error } = await supabaseClient.storage
        .from('student-avatars')
        .upload(filePath, file);

      if (error) {
        showToast("Error al subir imagen.");
        return;
      }

      // Get public URL
      const { data: urlData } = supabaseClient.storage
        .from('student-avatars')
        .getPublicUrl(filePath);

      const publicUrl = urlData.publicUrl;

      // Update in profile table
      const { error: updateErr } = await supabaseClient
        .from('estudiantes')
        .update({ avatar_url: publicUrl })
        .eq('id', currentUser.id);

      if (updateErr) {
        showToast("Error al vincular imagen a tu perfil.");
      } else {
        showToast("Foto de perfil actualizada.");
        document.getElementById('student-avatar').src = publicUrl;
        studentProfile.avatar_url = publicUrl;
      }
    }

    function togglePasswordForm() {
      const form = document.getElementById('password-form-section');
      form.style.display = form.style.display === 'none' ? 'flex' : 'none';
    }

    async function updatePassword() {
      const newPassword = document.getElementById('new-password').value.trim();
      if (newPassword.length < 6) {
        showToast("La contraseña debe tener mínimo 6 caracteres.");
        return;
      }

      const { error } = await supabaseClient.auth.updateUser({
        password: newPassword
      });

      if (error) {
        showToast("Error al cambiar contraseña.");
      } else {
        showToast("Contraseña cambiada con éxito.");
        document.getElementById('new-password').value = "";
        togglePasswordForm();
      }
    }

    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value.trim();

      if (!email || !password) {
        showToast("Ingresa correo y contraseña.");
        return;
      }

      if (!supabaseClient) {
        showToast("Supabase no configurado aún.");
        return;
      }

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) {
        showToast("Credenciales inválidas.");
      } else {
        showToast("¡Bienvenido de vuelta!");
      }
    }

    async function handleLogout() {
      if (supabaseClient) {
        await supabaseClient.auth.signOut();
      }
      currentUser = null;
      studentProfile = null;
      showAuthView();
    }

    window.addEventListener('DOMContentLoaded', () => {
      initSupabase();
    });
  </script>
</body>
</html>
