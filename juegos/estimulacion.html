<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Microsoft Clarity Tracking Code -->
  <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "xfop6mj4wx");
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Seven Keys School | Jardín de los Sonidos</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
      height: 100vh;
      max-height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    header {
      padding: 0.8rem 1.5rem;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(8px);
      z-index: 20;
      position: relative;
    }

    .header-logo {
      height: 48px;
      width: auto;
    }

    .stimulation-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0.5rem 1rem 1rem 1rem;
      position: relative;
    }

    /* Top Controls Panel */
    .controls-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 0.6rem 1.2rem;
      border-radius: 16px;
      z-index: 10;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .control-label {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .btn-toggle-group {
      display: flex;
      background: rgba(0, 0, 0, 0.25);
      padding: 3px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .btn-toggle {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 700;
      border-radius: 9px;
      cursor: pointer;
      transition: var(--transition-smooth);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-toggle.active {
      background: var(--color-gold);
      color: #020617;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.25);
    }

    .btn-toggle:hover:not(.active) {
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
    }

    /* Main Sandbox Play Area */
    .sandbox-area {
      flex: 1;
      width: 100%;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
    }

    #effects-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    /* Xylophone Mode */
    .xylophone-grid {
      display: flex;
      width: 100%;
      height: 100%;
      padding: 1.5rem;
      gap: 0.75rem;
      z-index: 1;
      position: relative;
    }

    .xylo-bar {
      flex: 1;
      height: 100%;
      border-radius: 20px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      padding-bottom: 2rem;
      box-shadow: 
        0 8px 0 rgba(0,0,0,0.35),
        inset 0 4px 0 rgba(255,255,255,0.2),
        inset 0 -12px 20px rgba(0,0,0,0.2);
      transition: transform 0.08s ease, box-shadow 0.08s ease;
      touch-action: none;
    }

    .xylo-bar::after {
      content: '';
      position: absolute;
      top: 15px;
      width: 14px;
      height: 14px;
      background: #334155;
      border-radius: 50%;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.2);
    }

    .xylo-bar::before {
      content: '';
      position: absolute;
      bottom: 15px;
      width: 14px;
      height: 14px;
      background: #334155;
      border-radius: 50%;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.2);
    }

    .xylo-bar:active, .xylo-bar.active-touch {
      transform: translateY(6px);
      box-shadow: 
        0 2px 0 rgba(0,0,0,0.3),
        inset 0 4px 0 rgba(255,255,255,0.1),
        inset 0 -4px 10px rgba(0,0,0,0.4);
    }

    .xylo-label {
      font-size: 1.6rem;
      font-weight: 800;
      color: #020617;
      pointer-events: none;
      text-shadow: 0 1px 1px rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.45);
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      box-shadow: 0 4px 6px rgba(0,0,0,0.15);
    }

    /* Professional Hand-drawn Vector Garden Layout */
    .garden-view {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #070d1e 0%, #152216 65%, #221810 100%);
      display: none;
      z-index: 1;
    }

    .toy-element {
      position: absolute;
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 3;
      touch-action: none;
    }

    .toy-element:active {
      transform: scale(1.25) rotate(5deg);
    }

    /* Vector SVG Sizes and Positions */
    .toy-sun { top: 8%; right: 12%; width: 110px; height: 110px; }
    .toy-cloud1 { top: 12%; left: 15%; width: 140px; height: 75px; }
    .toy-cloud2 { top: 22%; left: 45%; width: 120px; height: 65px; }
    
    /* Big tree structure */
    .toy-tree { top: 20%; left: 5%; width: 280px; height: 350px; }
    .toy-bird { top: 40%; left: 16%; width: 50px; height: 50px; z-index: 4; }
    .toy-apple1 { top: 32%; left: 11%; width: 40px; height: 40px; z-index: 4; }
    .toy-apple2 { top: 38%; left: 22%; width: 40px; height: 40px; z-index: 4; }

    /* Pond and Frog */
    .toy-pond { bottom: 5%; right: 8%; width: 220px; height: 90px; }
    .toy-frog { bottom: 10%; right: 14%; width: 55px; height: 55px; z-index: 4; }

    /* Floor elements */
    .toy-mushroom1 { bottom: 10%; left: 42%; width: 45px; height: 50px; }
    .toy-mushroom2 { bottom: 7%; left: 48%; width: 35px; height: 40px; }
    
    .toy-flower-red { bottom: 8%; left: 34%; width: 45px; height: 75px; }
    .toy-flower-yellow { bottom: 10%; left: 58%; width: 45px; height: 75px; }
    .toy-flower-blue { bottom: 6%; left: 66%; width: 45px; height: 75px; }
    .toy-snail { bottom: 6%; left: 76%; width: 60px; height: 45px; }

    /* Star Background Decoration */
    .glowing-bg-star {
      position: absolute;
      color: rgba(255, 255, 255, 0.15);
      font-size: 0.8rem;
      pointer-events: none;
      animation: flashStar 3s infinite ease-in-out;
    }

    @keyframes flashStar {
      0%, 100% { opacity: 0.15; transform: scale(0.8); }
      50% { opacity: 0.7; transform: scale(1.25); }
    }

    .loading-notice {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1.5rem 2.5rem;
      border-radius: 20px;
      text-align: center;
      z-index: 100;
      pointer-events: none;
      display: none;
    }

    .loading-notice p {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .loading-notice .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid var(--color-gold);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .stimulation-container {
        padding: 0.5rem;
      }
      .controls-panel {
        flex-direction: column;
        gap: 0.6rem;
        padding: 0.6rem;
      }
      .xylo-bar {
        border-radius: 14px;
        padding-bottom: 1rem;
      }
      .xylo-label {
        font-size: 1.2rem;
        width: 32px;
        height: 32px;
      }
      /* Scale down garden items on mobile */
      .toy-sun { width: 80px; height: 80px; }
      .toy-cloud1 { width: 90px; height: 50px; }
      .toy-cloud2 { width: 80px; height: 45px; }
      .toy-tree { width: 170px; height: 220px; }
      .toy-pond { width: 140px; height: 60px; }
      .toy-bird { width: 35px; height: 35px; }
      .toy-frog { width: 35px; height: 35px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-container">
      <img src="../img/logo.png" alt="Seven Keys School" class="header-logo">
    </div>
    <a href="index.html" class="btn-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Volver a Juegos
    </a>
  </header>

  <main class="stimulation-container">
    <!-- Scientific Early Stimulation Controls -->
    <div class="controls-panel">
      <div class="control-group">
        <span class="control-label">Juego:</span>
        <div class="btn-toggle-group">
          <button class="btn-toggle active" id="btn-mode-xylo" onclick="setMode('xylo')">
            <i class="fas fa-cubes"></i> Xilófono
          </button>
          <button class="btn-toggle" id="btn-mode-forest" onclick="setMode('forest')">
            <i class="fas fa-leaf"></i> Jardín Sensorial
          </button>
        </div>
      </div>

      <div class="control-group">
        <span class="control-label">Sensación:</span>
        <div class="btn-toggle-group">
          <button class="btn-toggle active" id="btn-scale-pentatonic" onclick="setScale('pentatonic')">
            🌈 Mágico
          </button>
          <button class="btn-toggle" id="btn-scale-major" onclick="setScale('major')">
            ☀️ Alegre
          </button>
          <button class="btn-toggle" id="btn-scale-minor" onclick="setScale('minor')">
            🌙 Misterioso
          </button>
        </div>
      </div>

      <div class="control-group" id="instrument-control-group">
        <span class="control-label">Instrumento:</span>
        <div class="btn-toggle-group">
          <button class="btn-toggle active" id="btn-timbre-real-xylo" onclick="setTimbre('real-xylo')">
            🪵 Xilófono Real
          </button>
          <button class="btn-toggle" id="btn-timbre-bell" onclick="setTimbre('bell')">
            ✨ Campanas
          </button>
        </div>
      </div>
    </div>

    <!-- Sandbox Play Area -->
    <div class="sandbox-area" id="play-sandbox">
      <canvas id="effects-canvas"></canvas>

      <!-- Loading notice -->
      <div class="loading-notice" id="loading-notice">
        <p>Cargando xilófono real...</p>
        <div class="spinner"></div>
      </div>

      <!-- Mode 1: Color Xylophone -->
      <div class="xylophone-grid" id="xylo-wrapper">
        <!-- Bars are dynamically injected based on selected scale -->
      </div>

      <!-- Mode 2: Professional SVG Magical Sensory Garden -->
      <div class="garden-view" id="forest-wrapper">
        <!-- Stars decoration -->
        <span class="glowing-bg-star" style="top: 8%; left: 8%;">⭐</span>
        <span class="glowing-bg-star" style="top: 16%; left: 32%;">⭐</span>
        <span class="glowing-bg-star" style="top: 6%; left: 54%;">⭐</span>
        <span class="glowing-bg-star" style="top: 18%; left: 70%;">⭐</span>
        <span class="glowing-bg-star" style="top: 24%; left: 88%;">⭐</span>

        <!-- Sun SVG -->
        <div class="toy-element toy-sun" onmousedown="playGardenElement('sun', event)" ontouchstart="playGardenElement('sun', event)">
          <svg viewBox="0 0 100 100" width="100%" height="100%">
            <circle cx="50" cy="50" r="24" fill="#fbbf24" filter="drop-shadow(0 0 12px #f59e0b)" />
            <path d="M50 8 L50 20 M50 80 L50 92 M8 50 L20 50 M80 50 L92 50 M20 20 L29 29 M71 71 L80 80 M20 80 L29 71 M71 29 L80 20" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" />
          </svg>
        </div>

        <!-- Clouds SVGs -->
        <div class="toy-element toy-cloud1" onmousedown="playGardenElement('cloud1', event)" ontouchstart="playGardenElement('cloud1', event)">
          <svg viewBox="0 0 100 60" width="100%" height="100%">
            <path d="M10 45 A 20 20 0 0 1 35 25 A 25 25 0 0 1 75 25 A 18 18 0 0 1 90 45 Z" fill="#e2e8f0" opacity="0.9" />
          </svg>
        </div>
        <div class="toy-element toy-cloud2" onmousedown="playGardenElement('cloud2', event)" ontouchstart="playGardenElement('cloud2', event)">
          <svg viewBox="0 0 100 60" width="100%" height="100%">
            <path d="M10 45 A 16 16 0 0 1 30 28 A 20 20 0 0 1 70 28 A 15 15 0 0 1 90 45 Z" fill="#e2e8f0" opacity="0.8" />
          </svg>
        </div>

        <!-- Big Tree SVG -->
        <div class="toy-element toy-tree" onmousedown="playGardenElement('tree', event)" ontouchstart="playGardenElement('tree', event)">
          <svg viewBox="0 0 200 250" width="100%" height="100%">
            <!-- Trunk -->
            <path d="M85 250 L85 140 C85 100 60 80 50 70 L60 70 C75 85 95 100 100 130 C105 100 125 85 140 70 L150 70 C140 80 115 100 115 140 L115 250 Z" fill="#78350f" />
            <!-- Canopy -->
            <circle cx="65" cy="90" r="50" fill="#047857" opacity="0.95" />
            <circle cx="135" cy="90" r="50" fill="#065f46" opacity="0.95" />
            <circle cx="100" cy="55" r="55" fill="#059669" />
          </svg>
        </div>

        <!-- Bird in the Tree SVG -->
        <div class="toy-element toy-bird" onmousedown="playGardenElement('bird', event)" ontouchstart="playGardenElement('bird', event)">
          <svg viewBox="0 0 60 60" width="100%" height="100%">
            <!-- Bird Body -->
            <circle cx="30" cy="30" r="20" fill="#3b82f6" />
            <circle cx="42" cy="22" r="8" fill="#60a5fa" />
            <!-- Beak -->
            <polygon points="48,20 56,24 48,28" fill="#f59e0b" />
            <!-- Eye -->
            <circle cx="42" cy="20" r="2" fill="#000" />
            <!-- Tail Wing -->
            <path d="M12 28 Q 6 34 12 40 Z" fill="#1d4ed8" />
          </svg>
        </div>

        <!-- Apples SVGs -->
        <div class="toy-element toy-apple1" onmousedown="playGardenElement('apple1', event)" ontouchstart="playGardenElement('apple1', event)">
          <svg viewBox="0 0 40 40" width="100%" height="100%">
            <circle cx="20" cy="22" r="15" fill="#ef4444" />
            <path d="M20 7 Q 23 2 20 0 Q 17 2 20 7" fill="#15803d" />
            <rect x="19" y="3" width="2" height="5" fill="#78350f" />
          </svg>
        </div>
        <div class="toy-element toy-apple2" onmousedown="playGardenElement('apple2', event)" ontouchstart="playGardenElement('apple2', event)">
          <svg viewBox="0 0 40 40" width="100%" height="100%">
            <circle cx="20" cy="22" r="15" fill="#dc2626" />
            <path d="M20 7 Q 23 2 20 0 Q 17 2 20 7" fill="#15803d" />
            <rect x="19" y="3" width="2" height="5" fill="#78350f" />
          </svg>
        </div>

        <!-- Pond SVG -->
        <div class="toy-element toy-pond" onmousedown="playGardenElement('pond', event)" ontouchstart="playGardenElement('pond', event)">
          <svg viewBox="0 0 200 80" width="100%" height="100%">
            <ellipse cx="100" cy="40" rx="90" ry="35" fill="#0369a1" opacity="0.8" />
            <ellipse cx="90" cy="38" rx="80" ry="28" fill="#0284c7" />
          </svg>
        </div>

        <!-- Frog by the pond SVG -->
        <div class="toy-element toy-frog" onmousedown="playGardenElement('frog', event)" ontouchstart="playGardenElement('frog', event)">
          <svg viewBox="0 0 60 60" width="100%" height="100%">
            <!-- Frog head/body -->
            <ellipse cx="30" cy="35" rx="22" ry="18" fill="#22c55e" />
            <!-- Big Eyes -->
            <circle cx="18" cy="18" r="8" fill="#22c55e" />
            <circle cx="18" cy="18" r="5" fill="#fff" />
            <circle cx="18" cy="18" r="2.5" fill="#000" />
            <circle cx="42" cy="18" r="8" fill="#22c55e" />
            <circle cx="42" cy="18" r="5" fill="#fff" />
            <circle cx="42" cy="18" r="2.5" fill="#000" />
            <!-- Smile -->
            <path d="M20 40 Q 30 48 40 40" stroke="#15803d" stroke-width="3" fill="none" stroke-linecap="round" />
          </svg>
        </div>

        <!-- Mushrooms SVGs -->
        <div class="toy-element toy-mushroom1" onmousedown="playGardenElement('mushroom1', event)" ontouchstart="playGardenElement('mushroom1', event)">
          <svg viewBox="0 0 50 60" width="100%" height="100%">
            <!-- Stem -->
            <path d="M18 60 C18 40 32 40 32 60 Z" fill="#e2e8f0" />
            <!-- Cap -->
            <path d="M5 36 C5 15 45 15 45 36 Z" fill="#ef4444" />
            <!-- Spots -->
            <circle cx="15" cy="24" r="3" fill="#fff" />
            <circle cx="25" cy="20" r="4" fill="#fff" />
            <circle cx="35" cy="26" r="3" fill="#fff" />
          </svg>
        </div>
        <div class="toy-element toy-mushroom2" onmousedown="playGardenElement('mushroom2', event)" ontouchstart="playGardenElement('mushroom2', event)">
          <svg viewBox="0 0 50 60" width="100%" height="100%">
            <path d="M18 60 C18 40 32 40 32 60 Z" fill="#cbd5e1" />
            <path d="M5 36 C5 15 45 15 45 36 Z" fill="#f97316" />
            <circle cx="20" cy="22" r="3" fill="#fff" />
            <circle cx="30" cy="25" r="3" fill="#fff" />
          </svg>
        </div>

        <!-- Flowers SVGs (Styled Custom Vectors) -->
        <div class="toy-element toy-flower-red" onmousedown="playGardenElement('flower-red', event)" ontouchstart="playGardenElement('flower-red', event)">
          <svg viewBox="0 0 50 80" width="100%" height="100%">
            <rect x="23" y="35" width="4" height="45" fill="#166534" />
            <!-- Leaves -->
            <path d="M25 50 Q 38 45 30 40 Z" fill="#15803d" />
            <path d="M25 60 Q 12 55 20 50 Z" fill="#15803d" />
            <!-- Petals -->
            <circle cx="25" cy="25" r="10" fill="#ef4444" />
            <circle cx="15" cy="25" r="8" fill="#dc2626" />
            <circle cx="35" cy="25" r="8" fill="#dc2626" />
            <circle cx="25" cy="15" r="8" fill="#dc2626" />
            <circle cx="25" cy="35" r="8" fill="#dc2626" />
            <!-- Center -->
            <circle cx="25" cy="25" r="5" fill="#f59e0b" />
          </svg>
        </div>

        <div class="toy-element toy-flower-yellow" onmousedown="playGardenElement('flower-yellow', event)" ontouchstart="playGardenElement('flower-yellow', event)">
          <svg viewBox="0 0 50 80" width="100%" height="100%">
            <rect x="23" y="35" width="4" height="45" fill="#166534" />
            <path d="M25 50 Q 38 45 30 40 Z" fill="#15803d" />
            <circle cx="25" cy="25" r="12" fill="#fbbf24" />
            <circle cx="15" cy="20" r="7" fill="#f59e0b" />
            <circle cx="35" cy="20" r="7" fill="#f59e0b" />
            <circle cx="15" cy="30" r="7" fill="#f59e0b" />
            <circle cx="35" cy="30" r="7" fill="#f59e0b" />
            <circle cx="25" cy="25" r="6" fill="#78350f" />
          </svg>
        </div>

        <div class="toy-element toy-flower-blue" onmousedown="playGardenElement('flower-blue', event)" ontouchstart="playGardenElement('flower-blue', event)">
          <svg viewBox="0 0 50 80" width="100%" height="100%">
            <rect x="23" y="35" width="4" height="45" fill="#166534" />
            <path d="M25 60 Q 12 55 20 50 Z" fill="#15803d" />
            <!-- Tulip Petal -->
            <path d="M12 35 C12 15 38 15 38 35 Z" fill="#0284c7" />
            <path d="M18 35 C18 20 32 20 32 35 Z" fill="#38bdf8" />
          </svg>
        </div>

        <!-- Snail SVG -->
        <div class="toy-element toy-snail" onmousedown="playGardenElement('snail', event)" ontouchstart="playGardenElement('snail', event)">
          <svg viewBox="0 0 80 60" width="100%" height="100%">
            <!-- Body -->
            <path d="M10 50 Q 40 45 70 50 Q 75 42 70 35 L 60 35 C 50 35 40 40 30 42 Z" fill="#d97706" />
            <!-- Shell spiral -->
            <circle cx="38" cy="32" r="20" fill="#c084fc" stroke="#581c87" stroke-width="2" />
            <circle cx="38" cy="32" r="14" fill="#e9d5ff" stroke="#581c87" stroke-width="1.5" />
            <!-- Feelers -->
            <line x1="68" y1="36" x2="72" y2="24" stroke="#d97706" stroke-width="3" stroke-linecap="round" />
            <line x1="64" y1="36" x2="66" y2="22" stroke="#d97706" stroke-width="3" stroke-linecap="round" />
            <circle cx="72" cy="23" r="2" fill="#78350f" />
            <circle cx="66" cy="21" r="2" fill="#78350f" />
          </svg>
        </div>
      </div>
    </div>
  </main>

  <script>
    // --- Audio Files List (C4 to B4) ---
    const noteFiles = [
      '../music/xylophone/note1.wav', // DO (C4)
      '../music/xylophone/note2.wav', // RE (D4)
      '../music/xylophone/note3.wav', // MI (E4)
      '../music/xylophone/note4.wav', // FA (F4)
      '../music/xylophone/note5.wav', // SOL (G4)
      '../music/xylophone/note6.wav', // LA (A4)
      '../music/xylophone/note7.wav'  // SI (B4)
    ];

    let audioCtx = null;
    let selectedScale = 'pentatonic';
    let selectedTimbre = 'real-xylo';
    let currentMode = 'xylo';

    const audioBuffers = {};
    let soundsLoaded = false;
    let isLoadingSounds = false;

    // Frequencies and base Note index mappings
    // NOTE COLORS (DO = RED, RE = Orange, MI = Yellow, FA = Green, SOL = Cyan, LA = Blue, SI = Purple)
    const scales = {
      pentatonic: [
        { note: 'DO', freq: 261.63, noteIndex: 1, pitchRate: 1.00, color: '#ef4444' }, // Red
        { note: 'RE', freq: 293.66, noteIndex: 2, pitchRate: 1.00, color: '#f97316' }, // Orange
        { note: 'MI', freq: 329.63, noteIndex: 3, pitchRate: 1.00, color: '#eab308' }, // Yellow
        { note: 'SOL', freq: 392.00, noteIndex: 5, pitchRate: 1.00, color: '#06b6d4' }, // Cyan
        { note: 'LA', freq: 440.00, noteIndex: 6, pitchRate: 1.00, color: '#1d4ed8' }, // Blue
        { note: 'DO', freq: 523.25, noteIndex: 1, pitchRate: 2.00, color: '#ef4444' }  // Red (Agudo: C5)
      ],
      major: [
        { note: 'DO', freq: 261.63, noteIndex: 1, pitchRate: 1.00, color: '#ef4444' },
        { note: 'RE', freq: 293.66, noteIndex: 2, pitchRate: 1.00, color: '#f97316' },
        { note: 'MI', freq: 329.63, noteIndex: 3, pitchRate: 1.00, color: '#eab308' },
        { note: 'FA', freq: 349.23, noteIndex: 4, pitchRate: 1.00, color: '#22c55e' },
        { note: 'SOL', freq: 392.00, noteIndex: 5, pitchRate: 1.00, color: '#06b6d4' },
        { note: 'LA', freq: 440.00, noteIndex: 6, pitchRate: 1.00, color: '#1d4ed8' },
        { note: 'SI', freq: 493.88, noteIndex: 7, pitchRate: 1.00, color: '#a855f7' },
        { note: 'DO', freq: 523.25, noteIndex: 1, pitchRate: 2.00, color: '#ef4444' }
      ],
      minor: [
        { note: 'DO', freq: 261.63, noteIndex: 1, pitchRate: 1.00, color: '#ef4444' },
        { note: 'RE', freq: 293.66, noteIndex: 2, pitchRate: 1.00, color: '#f97316' },
        { note: 'MIb', freq: 311.13, noteIndex: 3, pitchRate: 0.9439, color: '#e1a506' },
        { note: 'FA', freq: 349.23, noteIndex: 4, pitchRate: 1.00, color: '#22c55e' },
        { note: 'SOL', freq: 392.00, noteIndex: 5, pitchRate: 1.00, color: '#06b6d4' },
        { note: 'LAb', freq: 415.30, noteIndex: 6, pitchRate: 0.9439, color: '#153bb1' },
        { note: 'SIb', freq: 466.16, noteIndex: 7, pitchRate: 0.9439, color: '#8c3fe0' },
        { note: 'DO', freq: 523.25, noteIndex: 1, pitchRate: 2.00, color: '#ef4444' }
      ]
    };

    // Garden Elements specific tones (frequencies / indices)
    const gardenToys = {
      sun: { noteIndex: 5, pitchRate: 2.0, color: '#ffd64b', emoji: '☀️' },         // C5 equivalent
      cloud1: { noteIndex: 3, pitchRate: 2.0, color: '#38bdf8', emoji: '☁️' },
      cloud2: { noteIndex: 6, pitchRate: 1.5, color: '#4bc5ff', emoji: '☁️' },
      tree: { noteIndex: 1, pitchRate: 1.0, color: '#22c55e', emoji: '🌳' },
      bird: { noteIndex: 3, pitchRate: 2.0, color: '#4ade80', emoji: '🐦' },
      apple1: { noteIndex: 5, pitchRate: 1.0, color: '#ef4444', emoji: '🍎' },
      apple2: { noteIndex: 6, pitchRate: 1.0, color: '#ff4b4b', emoji: '🍎' },
      pond: { noteIndex: 1, pitchRate: 0.5, color: '#00e5ff', emoji: '🌊' },        // Low C3
      frog: { noteIndex: 2, pitchRate: 0.5, color: '#4bff79', emoji: '🐸' },
      mushroom1: { noteIndex: 4, pitchRate: 0.5, color: '#eab308', emoji: '🍄' },
      mushroom2: { noteIndex: 5, pitchRate: 0.5, color: '#ff9c4b', emoji: '🍄' },
      'flower-red': { noteIndex: 1, pitchRate: 1.0, color: '#ef4444', emoji: '🌹' },
      'flower-yellow': { noteIndex: 3, pitchRate: 1.0, color: '#eab308', emoji: '🌻' },
      'flower-blue': { noteIndex: 4, pitchRate: 1.0, color: '#06b6d4', emoji: '🌷' },
      snail: { noteIndex: 7, pitchRate: 1.0, color: '#a855f7', emoji: '🐌' }
    };

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      triggerSoundsLoading();
    }

    async function triggerSoundsLoading() {
      if (isLoadingSounds || soundsLoaded) return;
      isLoadingSounds = true;
      const notice = document.getElementById('loading-notice');
      notice.style.display = 'block';

      for (let i = 0; i < noteFiles.length; i++) {
        try {
          const response = await fetch(noteFiles[i]);
          const arrayBuffer = await response.arrayBuffer();
          const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
          audioBuffers[i + 1] = audioBuffer;
        } catch (e) {
          console.error("Error loading note file:", noteFiles[i], e);
        }
      }
      soundsLoaded = true;
      isLoadingSounds = false;
      notice.style.display = 'none';
    }

    // Play Note dispatcher
    function playNote(noteIndex, rate, fallbackFreq) {
      initAudio();

      if (soundsLoaded && audioBuffers[noteIndex] && selectedTimbre === 'real-xylo') {
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffers[noteIndex];
        source.playbackRate.setValueAtTime(rate, audioCtx.currentTime);
        source.connect(audioCtx.destination);
        source.start(0);
      } else {
        // Fallback to high quality synthesized chimes
        playSynthChime(fallbackFreq);
      }
    }

    // Chime Synthesis
    function playSynthChime(freq) {
      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      const gainNode2 = audioCtx.createGain();
      
      osc1.connect(gainNode);
      osc2.connect(gainNode2);
      gainNode.connect(audioCtx.destination);
      gainNode2.connect(audioCtx.destination);
      
      const now = audioCtx.currentTime;
      
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(freq, now);
      
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(freq * 2.01, now);
      
      gainNode.gain.setValueAtTime(0.5, now);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
      
      gainNode2.gain.setValueAtTime(0.12, now);
      gainNode2.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
      
      osc1.start(now);
      osc2.start(now);
      
      osc1.stop(now + 1.9);
      osc2.stop(now + 0.7);
    }

    // --- Dynamic DOM Generation ---
    function renderXylophone() {
      const wrapper = document.getElementById('xylo-wrapper');
      wrapper.innerHTML = '';
      
      const bars = scales[selectedScale];
      bars.forEach((bar, index) => {
        const barElem = document.createElement('div');
        barElem.className = 'xylo-bar';
        barElem.style.backgroundColor = bar.color;
        
        const heightPercent = 100 - (index * 4);
        barElem.style.height = `${heightPercent}%`;
        
        const label = document.createElement('span');
        label.className = 'xylo-label';
        // Note: keeping DO, RE, MI visible only on the physical Xylophone bars for navigation, 
        // but completely hidden in the free sensory garden view.
        label.innerText = bar.note;
        
        barElem.appendChild(label);
        
        // Touch & Mouse triggers
        const trigger = (e) => {
          e.preventDefault();
          barElem.classList.add('active-touch');
          setTimeout(() => barElem.classList.remove('active-touch'), 100);
          
          playNote(bar.noteIndex, bar.pitchRate, bar.freq);
          
          const rect = barElem.getBoundingClientRect();
          const x = rect.left + rect.width / 2;
          const y = rect.top + rect.height / 2;
          spawnParticles(x, y, bar.color);
        };

        barElem.addEventListener('mousedown', trigger);
        barElem.addEventListener('touchstart', trigger);

        wrapper.appendChild(barElem);
      });
    }

    function setScale(scaleName) {
      selectedScale = scaleName;
      document.getElementById('btn-scale-pentatonic').classList.remove('active');
      document.getElementById('btn-scale-major').classList.remove('active');
      document.getElementById('btn-scale-minor').classList.remove('active');
      document.getElementById(`btn-scale-${scaleName}`).classList.add('active');
      
      if (currentMode === 'xylo') {
        renderXylophone();
      }
    }

    function setTimbre(timbreName) {
      selectedTimbre = timbreName;
      document.getElementById('btn-timbre-real-xylo').classList.remove('active');
      document.getElementById('btn-timbre-bell').classList.remove('active');
      document.getElementById(`btn-timbre-${timbreName}`).classList.add('active');
    }

    function setMode(modeName) {
      currentMode = modeName;
      document.getElementById('btn-mode-xylo').classList.remove('active');
      document.getElementById('btn-mode-forest').classList.remove('active');
      document.getElementById(`btn-mode-${modeName}`).classList.add('active');

      if (modeName === 'xylo') {
        document.getElementById('xylo-wrapper').style.display = 'flex';
        document.getElementById('forest-wrapper').style.display = 'none';
        document.getElementById('instrument-control-group').style.opacity = '1';
        document.getElementById('instrument-control-group').style.pointerEvents = 'auto';
        renderXylophone();
      } else {
        document.getElementById('xylo-wrapper').style.display = 'none';
        document.getElementById('forest-wrapper').style.display = 'block';
        document.getElementById('instrument-control-group').style.opacity = '0.4';
        document.getElementById('instrument-control-group').style.pointerEvents = 'none';
        
        initAudio();
      }
    }

    // Play specific garden toys
    function playGardenElement(elementKey, event) {
      event.preventDefault();
      const toy = gardenToys[elementKey];
      if (!toy) return;

      // Xylophone is forced in garden mode
      playNote(toy.noteIndex, toy.pitchRate, 261.63 * toy.pitchRate);

      // Extract coordinates
      let clientX, clientY;
      if (event.touches && event.touches[0]) {
        clientX = event.touches[0].clientX;
        clientY = event.touches[0].clientY;
      } else {
        clientX = event.clientX;
        clientY = event.clientY;
      }

      // Visual tap bounce on element
      const el = event.currentTarget;
      el.style.transform = 'scale(1.2) rotate(8deg)';
      setTimeout(() => el.style.transform = 'scale(1) rotate(0deg)', 250);

      // Spawn particles
      spawnParticles(clientX, clientY, toy.color);
      
      // Spawn floating emojis
      const pool = [toy.emoji, '✨', '🎈', '🌸', '🦋'];
      const chosenEmoji = pool[Math.floor(Math.random() * pool.length)];
      spawnGardenEmoji(clientX, clientY, chosenEmoji);
    }

    // --- Particle Physics Effects Engine ---
    const canvas = document.getElementById('effects-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      const sandbox = document.getElementById('play-sandbox');
      canvas.width = sandbox.clientWidth;
      canvas.height = sandbox.clientHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 300);

    class Particle {
      constructor(x, y, color) {
        const rect = canvas.getBoundingClientRect();
        this.x = x - rect.left;
        this.y = y - rect.top;
        this.color = color;
        this.size = Math.random() * 12 + 6;
        this.speedX = Math.random() * 8 - 4;
        this.speedY = Math.random() * 8 - 4;
        this.gravity = 0.12;
        this.alpha = 1;
        this.decay = Math.random() * 0.02 + 0.015;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.speedY += this.gravity;
        this.alpha -= this.decay;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.restore();
      }
    }

    function spawnParticles(x, y, color) {
      for (let i = 0; i < 15; i++) {
        particles.push(new Particle(x, y, color));
      }
    }

    function spawnGardenEmoji(x, y, emoji) {
      const el = document.createElement('div');
      el.style.position = 'absolute';
      el.style.pointerEvents = 'none';
      el.style.fontSize = `${Math.random() * 1.5 + 1.8}rem`;
      el.style.zIndex = '10';
      el.innerText = emoji;
      
      const sandboxRect = document.getElementById('play-sandbox').getBoundingClientRect();
      el.style.left = `${x - sandboxRect.left}px`;
      el.style.top = `${y - sandboxRect.top}px`;
      
      document.getElementById('play-sandbox').appendChild(el);
      
      let speedY = Math.random() * -4 - 3;
      let speedX = Math.random() * 6 - 3;
      let opacity = 1;
      let scale = 1;
      let rot = 0;
      let rotSpeed = Math.random() * 12 - 6;
      
      function step() {
        speedY += 0.08;
        const curTop = parseFloat(el.style.top);
        const curLeft = parseFloat(el.style.left);
        
        el.style.top = `${curTop + speedY}px`;
        el.style.left = `${curLeft + speedX}px`;
        el.style.transform = `rotate(${rot}deg) scale(${scale})`;
        el.style.opacity = opacity;
        
        rot += rotSpeed;
        opacity -= 0.02;
        scale -= 0.01;
        
        if (opacity > 0) {
          requestAnimationFrame(step);
        } else {
          el.remove();
        }
      }
      requestAnimationFrame(step);
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        
        if (particles[i].alpha <= 0) {
          particles.splice(i, 1);
        }
      }
      requestAnimationFrame(animate);
    }

    // Initialize Loops
    renderXylophone();
    animate();
  </script>
</body>
</html>
