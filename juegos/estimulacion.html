<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Microsoft Clarity Tracking Code -->
  <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "xfop6mj4wx");
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Seven Keys School | Cielo y Tierra</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background: #020617;
      height: 100vh;
      max-height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    header {
      padding: 0.8rem 1.5rem;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(8px);
      z-index: 20;
      position: relative;
    }

    .header-logo {
      height: 48px;
      width: auto;
    }

    .stimulation-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0.5rem 1rem 1rem 1rem;
      position: relative;
    }

    /* Top Controls Panel */
    .controls-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 0.6rem 1.2rem;
      border-radius: 16px;
      z-index: 10;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .control-label {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .btn-toggle-group {
      display: flex;
      background: rgba(0, 0, 0, 0.25);
      padding: 3px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .btn-toggle {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 700;
      border-radius: 9px;
      cursor: pointer;
      transition: var(--transition-smooth);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-toggle.active {
      background: var(--color-gold);
      color: #020617;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.25);
    }

    .btn-toggle:hover:not(.active) {
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
    }

    /* Main Sandbox Play Area */
    .sandbox-area {
      flex: 1;
      width: 100%;
      background: #020617;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    #effects-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    /* Split Screen Layout (Cielo y Tierra) */
    .split-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      z-index: 1;
      position: relative;
    }

    .zone-half {
      flex: 1;
      width: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease;
      touch-action: none;
    }

    /* Cielo (High sound zone) */
    .zone-sky-half {
      background: linear-gradient(to bottom, #070e24 0%, #111d40 100%);
      border-bottom: 2px solid rgba(255, 255, 255, 0.05);
    }

    /* Tierra (Low sound zone) */
    .zone-ground-half {
      background: linear-gradient(to bottom, #2d160a 0%, #171514 100%);
    }

    /* Background details */
    .zone-graphics {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      opacity: 0.5;
    }

    /* Interactive Toy Elements */
    .toy-element {
      position: relative;
      width: 160px;
      height: 160px;
      cursor: pointer;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s ease;
      touch-action: none;
    }

    .toy-element:hover {
      filter: brightness(1.15);
    }

    /* Pulse animation triggered on sound (Level 1) */
    .pulse-glow-active {
      animation: elementPulse 0.6s infinite ease-in-out;
    }

    /* Pulse animation for incorrect selection guidance */
    .guide-pulse-active {
      animation: elementPulse 0.4s 3 ease-in-out;
    }

    @keyframes elementPulse {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.1)) brightness(1);
      }
      50% {
        transform: scale(1.22);
        filter: drop-shadow(0 0 30px var(--glow-color)) brightness(1.3);
      }
    }

    /* Play/Listen button in the middle */
    .challenge-center-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--color-gold);
      color: #020617;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
      z-index: 10;
      cursor: pointer;
      border: 4px solid #ffffff;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .challenge-center-button:active {
      transform: translate(-50%, -50%) scale(1.15);
    }

    .challenge-center-button i {
      font-size: 2.2rem;
    }

    /* Glowing background stars */
    .bg-glowing-star {
      position: absolute;
      color: rgba(255, 255, 255, 0.12);
      font-size: 0.8rem;
      pointer-events: none;
      animation: flashStar 3s infinite ease-in-out;
    }

    @keyframes flashStar {
      0%, 100% { opacity: 0.1; transform: scale(0.8); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }

    /* Loading indicator */
    .loading-notice {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1.5rem 2.5rem;
      border-radius: 20px;
      text-align: center;
      z-index: 100;
      pointer-events: none;
      display: none;
    }

    .loading-notice p {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .loading-notice .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid var(--color-gold);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Floating Game Emojis */
    .glowing-emoji {
      position: absolute;
      pointer-events: none;
      font-size: 2.5rem;
      z-index: 4;
    }

    @media (max-width: 768px) {
      .stimulation-container {
        padding: 0.5rem;
      }
      .controls-panel {
        flex-direction: column;
        gap: 0.6rem;
        padding: 0.6rem;
      }
      .toy-element {
        width: 130px;
        height: 130px;
      }
      .challenge-center-button {
        width: 70px;
        height: 70px;
      }
      .challenge-center-button i {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-container">
      <img src="../img/logo.png" alt="Seven Keys School" class="header-logo">
    </div>
    <a href="index.html" class="btn-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Volver a Juegos
    </a>
  </header>

  <main class="stimulation-container">
    <!-- Game Mode Controls -->
    <div class="controls-panel">
      <div class="control-group">
        <span class="control-label">Nivel:</span>
        <div class="btn-toggle-group">
          <button class="btn-toggle active" id="btn-mode-learn" onclick="setMode('learn')">
            <i class="fas fa-eye"></i> Nivel 1: Descubrir
          </button>
          <button class="btn-toggle" id="btn-mode-challenge" onclick="setMode('challenge')">
            <i class="fas fa-question-circle"></i> Nivel 2: El Reto
          </button>
        </div>
      </div>

      <div class="control-group">
        <span class="control-label">Sonido:</span>
        <div class="btn-toggle-group">
          <button class="btn-toggle active" id="btn-sound-chime" onclick="setSoundType('chime')">
            ✨ Campanas
          </button>
          <button class="btn-toggle" id="btn-sound-marimba" onclick="setSoundType('marimba')">
            🪵 Xilófono
          </button>
        </div>
      </div>
    </div>

    <!-- Sandbox Play Area -->
    <div class="sandbox-area" id="play-sandbox">
      <canvas id="effects-canvas"></canvas>

      <!-- Loading notice -->
      <div class="loading-notice" id="loading-notice">
        <p>Cargando sonidos reales...</p>
        <div class="spinner"></div>
      </div>

      <!-- Play Button for Challenge / Listening -->
      <button class="challenge-center-button" id="btn-listen" onclick="playChallengeSound()" aria-label="Escuchar Sonido">
        <i class="fas fa-volume-up"></i>
      </button>

      <!-- Split Screen Layout -->
      <div class="split-container">
        <!-- Sky (High Note - Star) -->
        <div class="zone-half zone-sky-half" id="zone-sky">
          <div class="zone-graphics">
            <span class="bg-glowing-star" style="top: 15%; left: 15%;">⭐</span>
            <span class="bg-glowing-star" style="top: 35%; left: 48%;">⭐</span>
            <span class="bg-glowing-star" style="top: 20%; left: 82%;">⭐</span>
          </div>

          <!-- Large Vector Star Element -->
          <div class="toy-element" id="toy-star" style="--glow-color: rgba(56, 189, 248, 0.65);" onmousedown="onElementTap('sky', event)" ontouchstart="onElementTap('sky', event)">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
              <!-- Glowing magical vector star -->
              <path d="M50 5 L63 36 L96 38 L71 60 L78 93 L50 75 L22 93 L29 60 L4 38 L37 36 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="3" stroke-linejoin="round" filter="drop-shadow(0 0 12px rgba(251, 191, 36, 0.8))" />
              <!-- Cute baby face details without distracting text -->
              <circle cx="40" cy="45" r="4.5" fill="#000" />
              <circle cx="60" cy="45" r="4.5" fill="#000" />
              <path d="M42 58 Q 50 66 58 58" stroke="#000" stroke-width="3.5" fill="none" stroke-linecap="round" />
            </svg>
          </div>
        </div>

        <!-- Ground (Low Note - Drum) -->
        <div class="zone-half zone-ground-half" id="zone-ground">
          <div class="zone-graphics">
            <span class="bg-glowing-star" style="bottom: 15%; left: 18%;">⭐</span>
            <span class="bg-glowing-star" style="bottom: 30%; left: 52%;">⭐</span>
            <span class="bg-glowing-star" style="bottom: 20%; left: 78%;">⭐</span>
          </div>

          <!-- Large Vector Drum Element -->
          <div class="toy-element" id="toy-drum" style="--glow-color: rgba(251, 146, 60, 0.65);" onmousedown="onElementTap('ground', event)" ontouchstart="onElementTap('ground', event)">
            <svg viewBox="0 0 120 120" width="100%" height="100%">
              <!-- Drum body vector -->
              <path d="M20 30 L20 85 C20 105 100 105 100 85 L100 30 Z" fill="#b45309" stroke="#78350f" stroke-width="4" />
              <!-- Native stripes decoration -->
              <path d="M20 50 L100 50 M20 70 L100 70 M40 85 L80 85" stroke="#78350f" stroke-width="4" stroke-linecap="round" />
              <!-- Drumhead -->
              <ellipse cx="60" cy="30" rx="40" ry="12" fill="#fed7aa" stroke="#78350f" stroke-width="4" />
            </svg>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // --- Audio setup ---
    const noteFiles = [
      '../music/xylophone/note1.wav', // DO4 (C4) - used for Low Drum
      '../music/xylophone/note7.wav'  // SI4 (B4) - used for High Star
    ];

    let audioCtx = null;
    let selectedSound = 'chime';
    let currentMode = 'learn'; // 'learn' or 'challenge'

    const audioBuffers = {};
    let soundsLoaded = false;
    let isLoadingSounds = false;

    // Challenge & State variables
    let currentTarget = null; // 'sky' or 'ground'
    let isWaitingForAnswer = false;
    let currentActiveTimer = null;

    const elementDetails = {
      sky: {
        noteIndex: 7, // SI4 (High)
        pitchRate: 1.25, // Shift higher for clear crystal tone
        synthFreq: 880.00, // High A5
        color: '#fbbf24', // Golden Star
        emoji: '⭐',
        elementId: 'toy-star'
      },
      ground: {
        noteIndex: 1, // DO4 (Low)
        pitchRate: 0.5, // Shift down one octave for deep rumble
        synthFreq: 130.81, // Low C3
        color: '#fb923c', // Warm Orange Drum
        emoji: '🥁',
        elementId: 'toy-drum'
      }
    };

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      triggerSoundsLoading();
    }

    async function triggerSoundsLoading() {
      if (isLoadingSounds || soundsLoaded) return;
      isLoadingSounds = true;
      const notice = document.getElementById('loading-notice');
      notice.style.display = 'block';

      try {
        const response1 = await fetch(noteFiles[0]);
        const arrayBuffer1 = await response1.arrayBuffer();
        audioBuffers[1] = await audioCtx.decodeAudioData(arrayBuffer1);

        const response2 = await fetch(noteFiles[1]);
        const arrayBuffer2 = await response2.arrayBuffer();
        audioBuffers[7] = await audioCtx.decodeAudioData(arrayBuffer2);
        
        soundsLoaded = true;
      } catch (e) {
        console.error("Error loading note files:", e);
      }

      isLoadingSounds = false;
      notice.style.display = 'none';
    }

    function playSound(zoneKey) {
      initAudio();
      const details = elementDetails[zoneKey];

      if (soundsLoaded && audioBuffers[details.noteIndex] && selectedSound === 'marimba') {
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffers[details.noteIndex];
        source.playbackRate.setValueAtTime(details.pitchRate, audioCtx.currentTime);
        source.connect(audioCtx.destination);
        source.start(0);
      } else {
        playSynthChime(details.synthFreq);
      }
    }

    function playSynthChime(freq) {
      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      const gainNode2 = audioCtx.createGain();
      
      osc1.connect(gainNode);
      osc2.connect(gainNode2);
      gainNode.connect(audioCtx.destination);
      gainNode2.connect(audioCtx.destination);
      
      const now = audioCtx.currentTime;
      
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(freq, now);
      
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(freq * 2.01, now);
      
      gainNode.gain.setValueAtTime(0.5, now);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
      
      gainNode2.gain.setValueAtTime(0.12, now);
      gainNode2.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
      
      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + 1.9);
      osc2.stop(now + 0.7);
    }

    function playSuccessChime() {
      const now = audioCtx.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.50];
      notes.forEach((freq, idx) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now + (idx * 0.08));
        
        gain.gain.setValueAtTime(0.3, now + (idx * 0.08));
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8 + (idx * 0.08));
        
        osc.start(now + (idx * 0.08));
        osc.stop(now + 0.9 + (idx * 0.08));
      });
    }

    function playFailChime() {
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(220.00, now);
      osc.frequency.linearRampToValueAtTime(180.00, now + 0.25);
      
      gain.gain.setValueAtTime(0.4, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      
      osc.start(now);
      osc.stop(now + 0.4);
    }

    // --- Interaction Logic ---
    function onElementTap(zone, event) {
      event.preventDefault();
      
      let clientX, clientY;
      if (event.touches && event.touches[0]) {
        clientX = event.touches[0].clientX;
        clientY = event.touches[0].clientY;
      } else {
        clientX = event.clientX;
        clientY = event.clientY;
      }

      const details = elementDetails[zone];
      const el = document.getElementById(details.elementId);
      
      // Tap Animation bounce
      el.style.transform = 'scale(1.3) rotate(8deg)';
      setTimeout(() => el.style.transform = 'scale(1) rotate(0deg)', 250);

      if (currentMode === 'learn') {
        // Nivel 1: plays sound and glows corresponding element
        playSound(zone);
        triggerVisualPulse(zone);
        
        spawnParticles(clientX, clientY, details.color);
        spawnFloatingEmoji(clientX, clientY, details.emoji);
      } else {
        // Nivel 2: Guessing mode answer
        if (!isWaitingForAnswer) return;
        isWaitingForAnswer = false;

        const btnListen = document.getElementById('btn-listen');

        if (zone === currentTarget) {
          // Correct!
          playSuccessChime();
          
          btnListen.style.background = '#10b981'; // Green
          btnListen.querySelector('i').className = 'fas fa-check';
          
          spawnParticles(clientX, clientY, '#10b981');
          for (let i = 0; i < 6; i++) {
            setTimeout(() => {
              spawnFloatingEmoji(clientX + (Math.random() * 80 - 40), clientY + (Math.random() * 80 - 40), details.emoji);
            }, i * 50);
          }

          // Next round automatically
          setTimeout(() => {
            resetChallengeUI();
            playChallengeSound();
          }, 1800);
        } else {
          // Wrong choice - guide them visually by pulsing the CORRECT element
          playFailChime();
          
          btnListen.style.background = '#ef4444'; // Red
          btnListen.querySelector('i').className = 'fas fa-volume-up';

          // Guide them by pulsing the correct vector element
          const correctDetails = elementDetails[currentTarget];
          const correctEl = document.getElementById(correctDetails.elementId);
          correctEl.classList.add('guide-pulse-active');
          setTimeout(() => correctEl.classList.remove('guide-pulse-active'), 1500);

          // Allow retry
          setTimeout(() => {
            btnListen.style.background = 'var(--color-gold)';
            isWaitingForAnswer = true;
          }, 1200);
        }
      }
    }

    // Helper to pulse element visually
    function triggerVisualPulse(zone) {
      const details = elementDetails[zone];
      const el = document.getElementById(details.elementId);
      el.classList.add('pulse-glow-active');
      setTimeout(() => el.classList.remove('pulse-glow-active'), 800);
    }

    // --- Mode Handlers ---
    function setMode(modeName) {
      currentMode = modeName;
      document.getElementById('btn-mode-learn').classList.remove('active');
      document.getElementById('btn-mode-challenge').classList.remove('active');
      document.getElementById(`btn-mode-${modeName}`).classList.add('active');

      const btnListen = document.getElementById('btn-listen');
      const starEl = document.getElementById('toy-star');
      const drumEl = document.getElementById('toy-drum');

      // Clear any running timers/pulses
      clearTimeout(currentActiveTimer);
      starEl.classList.remove('pulse-glow-active');
      drumEl.classList.remove('pulse-glow-active');

      if (modeName === 'learn') {
        btnListen.style.display = 'none';
        resetChallengeUI();
      } else {
        btnListen.style.display = 'flex';
        resetChallengeUI();
        initAudio(); // warm context
      }
    }

    function setSoundType(soundType) {
      selectedSound = soundType;
      document.getElementById('btn-sound-chime').classList.remove('active');
      document.getElementById('btn-sound-marimba').classList.remove('active');
      document.getElementById(`btn-sound-${soundType}`).classList.add('active');
      
      initAudio(); // warm context
    }

    function resetChallengeUI() {
      const btnListen = document.getElementById('btn-listen');
      btnListen.style.background = 'var(--color-gold)';
      btnListen.querySelector('i').className = 'fas fa-volume-up';
      btnListen.style.transform = 'translate(-50%, -50%) scale(1)';
      isWaitingForAnswer = false;
      currentTarget = null;
    }

    function playChallengeSound() {
      if (isWaitingForAnswer) {
        // Replay target sound
        playSound(currentTarget);
        
        // In Nivel 1 (if played from challenge center), also pulse visually
        if (currentMode === 'learn') {
          triggerVisualPulse(currentTarget);
        }
        return;
      }
      
      resetChallengeUI();
      currentTarget = Math.random() > 0.5 ? 'sky' : 'ground';
      
      // Animate center button
      const btn = document.getElementById('btn-listen');
      btn.style.transform = 'translate(-50%, -50%) scale(1.1)';
      setTimeout(() => btn.style.transform = 'translate(-50%, -50%) scale(1)', 200);

      // Play sound
      playSound(currentTarget);

      if (currentMode === 'learn') {
        // Nivel 1: Plays sound AND pulses/glows the correct element simultaneously!
        triggerVisualPulse(currentTarget);
        isWaitingForAnswer = false;
      } else {
        // Nivel 2: Plays sound but DOES NOT pulse the element. Child has to guess!
        isWaitingForAnswer = true;
      }
    }

    // --- Particle Physics Effects Engine ---
    const canvas = document.getElementById('effects-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      const sandbox = document.getElementById('play-sandbox');
      canvas.width = sandbox.clientWidth;
      canvas.height = sandbox.clientHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 300);

    class Particle {
      constructor(x, y, color) {
        const rect = canvas.getBoundingClientRect();
        this.x = x - rect.left;
        this.y = y - rect.top;
        this.color = color;
        this.size = Math.random() * 12 + 6;
        this.speedX = Math.random() * 8 - 4;
        this.speedY = Math.random() * 8 - 4;
        this.gravity = 0.12;
        this.alpha = 1;
        this.decay = Math.random() * 0.02 + 0.015;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.speedY += this.gravity;
        this.alpha -= this.decay;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.restore();
      }
    }

    function spawnParticles(x, y, color) {
      for (let i = 0; i < 15; i++) {
        particles.push(new Particle(x, y, color));
      }
    }

    function spawnFloatingEmoji(x, y, emoji) {
      const el = document.createElement('div');
      el.className = 'glowing-emoji';
      el.innerText = emoji;
      
      const sandboxRect = document.getElementById('play-sandbox').getBoundingClientRect();
      el.style.left = `${x - sandboxRect.left}px`;
      el.style.top = `${y - sandboxRect.top}px`;
      
      document.getElementById('play-sandbox').appendChild(el);
      
      let speedY = Math.random() * -3 - 2;
      let speedX = Math.random() * 4 - 2;
      let opacity = 1;
      let scale = 1;
      let rot = 0;
      let rotSpeed = Math.random() * 10 - 5;
      
      function step() {
        speedY += 0.08;
        const curTop = parseFloat(el.style.top);
        const curLeft = parseFloat(el.style.left);
        
        el.style.top = `${curTop + speedY}px`;
        el.style.left = `${curLeft + speedX}px`;
        el.style.transform = `rotate(${rot}deg) scale(${scale})`;
        el.style.opacity = opacity;
        
        rot += rotSpeed;
        opacity -= 0.02;
        scale -= 0.01;
        
        if (opacity > 0) {
          requestAnimationFrame(step);
        } else {
          el.remove();
        }
      }
      requestAnimationFrame(step);
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        
        if (particles[i].alpha <= 0) {
          particles.splice(i, 1);
        }
      }
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
