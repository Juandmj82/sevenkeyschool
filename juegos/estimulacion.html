<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Microsoft Clarity Tracking Code -->
  <script type="text/javascript">
      (function(c,l,a,r,i,t,y){

          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "xfop6mj4wx");
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Seven Keys School | Jardín de los Sonidos</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background: radial-gradient(circle at center, #0a0f1d 0%, #03050b 100%);
      height: 100vh;
      max-height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    header {
      padding: 0.8rem 1.5rem;
      background: rgba(7, 9, 19, 0.6);
      backdrop-filter: blur(8px);
      z-index: 20;
      position: relative;
    }

    .header-logo {
      height: 48px;
      width: auto;
    }

    .stimulation-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0.5rem 1rem 1rem 1rem;
      position: relative;
    }

    /* Top Controls Panel */
    .controls-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 0.6rem 1.2rem;
      border-radius: 16px;
      z-index: 10;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .control-label {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .btn-toggle-group {
      display: flex;
      background: rgba(0, 0, 0, 0.25);
      padding: 3px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .btn-toggle {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 700;
      border-radius: 9px;
      cursor: pointer;
      transition: var(--transition-smooth);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-toggle.active {
      background: var(--color-gold);
      color: #020617;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.25);
    }

    .btn-toggle:hover:not(.active) {
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
    }

    /* Main Sandbox Play Area */
    .sandbox-area {
      flex: 1;
      width: 100%;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
    }

    #effects-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    /* Xylophone Mode */
    .xylophone-grid {
      display: flex;
      width: 100%;
      height: 100%;
      padding: 1.5rem;
      gap: 0.75rem;
      z-index: 1;
      position: relative;
    }

    .xylo-bar {
      flex: 1;
      height: 100%;
      border-radius: 20px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      padding-bottom: 2rem;
      box-shadow: 
        0 8px 0 rgba(0,0,0,0.35),
        inset 0 4px 0 rgba(255,255,255,0.2),
        inset 0 -12px 20px rgba(0,0,0,0.2);
      transition: transform 0.08s ease, box-shadow 0.08s ease;
      touch-action: none;
    }

    .xylo-bar::after {
      content: '';
      position: absolute;
      top: 15px;
      width: 14px;
      height: 14px;
      background: #334155;
      border-radius: 50%;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.2);
    }

    .xylo-bar::before {
      content: '';
      position: absolute;
      bottom: 15px;
      width: 14px;
      height: 14px;
      background: #334155;
      border-radius: 50%;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.2);
    }

    .xylo-bar:active, .xylo-bar.active-touch {
      transform: translateY(6px);
      box-shadow: 
        0 2px 0 rgba(0,0,0,0.3),
        inset 0 4px 0 rgba(255,255,255,0.1),
        inset 0 -4px 10px rgba(0,0,0,0.4);
    }

    .xylo-label {
      font-size: 1.6rem;
      font-weight: 800;
      color: #020617;
      pointer-events: none;
      text-shadow: 0 1px 1px rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.45);
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      box-shadow: 0 4px 6px rgba(0,0,0,0.15);
    }

    /* Magical Sensory Garden Mode (Interactive Toy Landscape) */
    .garden-view {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #0c152b 0%, #1a2f1b 60%, #292015 100%);
      display: none;
      z-index: 1;
    }

    /* Interactive Toy Elements */
    .toy-element {
      position: absolute;
      cursor: pointer;
      font-size: 3.5rem;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }

    .toy-element:active {
      transform: scale(1.4) rotate(10deg);
    }

    /* Labels for the elements inside bubbles for babies */
    .toy-label {
      font-size: 0.75rem;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      padding: 0.15rem 0.5rem;
      border-radius: 8px;
      margin-top: 0.2rem;
      font-weight: 700;
      white-space: nowrap;
      pointer-events: none;
    }

    /* Specific element placements */
    .toy-sun { top: 12%; left: 75%; font-size: 4.8rem; }
    .toy-cloud1 { top: 10%; left: 15%; font-size: 4rem; opacity: 0.95; }
    .toy-cloud2 { top: 22%; left: 45%; font-size: 3.8rem; opacity: 0.95; }
    .toy-tree { top: 24%; left: 8%; font-size: 8rem; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.6)); }
    
    /* Apples hanging from tree canopy */
    .toy-apple1 { top: 38%; left: 16%; font-size: 2.2rem; }
    .toy-apple2 { top: 48%; left: 24%; font-size: 2.2rem; }
    .toy-bird { top: 46%; left: 12%; font-size: 2.4rem; z-index: 4; }

    /* Ground elements */
    .toy-pond { bottom: 8%; right: 10%; font-size: 6rem; opacity: 0.85; }
    .toy-frog { bottom: 12%; right: 18%; font-size: 2.6rem; z-index: 4; }
    .toy-mushroom1 { bottom: 12%; left: 45%; font-size: 2.8rem; }
    .toy-mushroom2 { bottom: 8%; left: 52%; font-size: 2.2rem; }
    
    /* Flowers */
    .toy-flower-red { bottom: 10%; left: 32%; font-size: 2.5rem; }
    .toy-flower-yellow { bottom: 12%; left: 65%; font-size: 2.5rem; }
    .toy-flower-blue { bottom: 7%; left: 74%; font-size: 2.5rem; }
    .toy-snail { bottom: 6%; left: 84%; font-size: 2.4rem; }

    /* Glowing stars background */
    .glowing-bg-star {
      position: absolute;
      color: rgba(255, 255, 255, 0.2);
      font-size: 0.8rem;
      pointer-events: none;
      animation: flashStar 3s infinite ease-in-out;
    }

    @keyframes flashStar {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 0.8; transform: scale(1.2); }
    }

    /* Floating Bubble Note indicator */
    .note-bubble {
      position: absolute;
      background: #ffffff;
      color: #020617;
      font-weight: 800;
      font-size: 1.5rem;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(255, 255, 255, 0.25);
      pointer-events: none;
      animation: floatUp 0.8s forwards cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 10;
      border: 3px solid;
    }

    @keyframes floatUp {
      0% {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 0;
      }
      20% {
        opacity: 1;
        transform: translate(-50%, -70%) scale(1.25);
      }
      100% {
        transform: translate(-50%, -140%) scale(0.9);
        opacity: 0;
      }
    }

    /* Loading alert */
    .loading-notice {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1.5rem 2.5rem;
      border-radius: 20px;
      text-align: center;
      z-index: 100;
      pointer-events: none;
      display: none;
    }

    .loading-notice p {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .loading-notice .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid var(--color-gold);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .stimulation-container {
        padding: 0.5rem;
      }
      .controls-panel {
        flex-direction: column;
        gap: 0.6rem;
        padding: 0.6rem;
      }
      .xylo-bar {
        border-radius: 14px;
        padding-bottom: 1rem;
      }
      .xylo-label {
        font-size: 1.2rem;
        width: 32px;
        height: 32px;
      }
      /* Reduce size of garden elements on mobile */
      .toy-element { font-size: 2.2rem; }
      .toy-sun { font-size: 3.2rem; }
      .toy-cloud1 { font-size: 2.5rem; }
      .toy-cloud2 { font-size: 2.5rem; }
      .toy-tree { font-size: 5.5rem; }
      .toy-pond { font-size: 4rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-container">
      <img src="../img/logo.png" alt="Seven Keys School" class="header-logo">
    </div>
    <a href="index.html" class="btn-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Volver a Juegos
    </a>
  </header>

  <main class="stimulation-container">
    <!-- Scientific Early Stimulation Controls -->
    <div class="controls-panel">
      <div class="control-group">
        <span class="control-label">Juego:</span>
        <div class="btn-toggle-group">
          <button class="btn-toggle active" id="btn-mode-xylo" onclick="setMode('xylo')">
            <i class="fas fa-cubes"></i> Xilófono
          </button>
          <button class="btn-toggle" id="btn-mode-forest" onclick="setMode('forest')">
            <i class="fas fa-leaf"></i> Jardín Sensorial
          </button>
        </div>
      </div>

      <div class="control-group">
        <span class="control-label">Sensación:</span>
        <div class="btn-toggle-group">
          <button class="btn-toggle active" id="btn-scale-pentatonic" onclick="setScale('pentatonic')">
            🌈 Mágico
          </button>
          <button class="btn-toggle" id="btn-scale-major" onclick="setScale('major')">
            ☀️ Alegre
          </button>
          <button class="btn-toggle" id="btn-scale-minor" onclick="setScale('minor')">
            🌙 Misterioso
          </button>
        </div>
      </div>

      <div class="control-group" id="instrument-control-group">
        <span class="control-label">Instrumento:</span>
        <div class="btn-toggle-group">
          <button class="btn-toggle active" id="btn-timbre-real-xylo" onclick="setTimbre('real-xylo')">
            🪵 Xilófono Real
          </button>
          <button class="btn-toggle" id="btn-timbre-bell" onclick="setTimbre('bell')">
            ✨ Campanas
          </button>
        </div>
      </div>
    </div>

    <!-- Sandbox Play Area -->
    <div class="sandbox-area" id="play-sandbox">
      <canvas id="effects-canvas"></canvas>

      <!-- Loading notice for audio buffers -->
      <div class="loading-notice" id="loading-notice">
        <p>Cargando sonidos reales...</p>
        <div class="spinner"></div>
      </div>

      <!-- Mode 1: Color Xylophone -->
      <div class="xylophone-grid" id="xylo-wrapper">
        <!-- Bars are dynamically injected based on selected scale -->
      </div>

      <!-- Mode 2: Magical Sensory Garden (Interactive Toy Landscape) -->
      <div class="garden-view" id="forest-wrapper">
        <!-- Starry background decoration -->
        <span class="glowing-bg-star" style="top: 8%; left: 5%;">⭐</span>
        <span class="glowing-bg-star" style="top: 18%; left: 35%;">⭐</span>
        <span class="glowing-bg-star" style="top: 5%; left: 52%;">⭐</span>
        <span class="glowing-bg-star" style="top: 15%; left: 68%;">⭐</span>
        <span class="glowing-bg-star" style="top: 25%; left: 90%;">⭐</span>

        <!-- Sun -->
        <div class="toy-element toy-sun" onmousedown="playGardenElement('sun', event)" ontouchstart="playGardenElement('sun', event)">
          ☀️
          <span class="toy-label">Sol</span>
        </div>

        <!-- Clouds -->
        <div class="toy-element toy-cloud1" onmousedown="playGardenElement('cloud1', event)" ontouchstart="playGardenElement('cloud1', event)">
          ☁️
          <span class="toy-label">Nube</span>
        </div>
        <div class="toy-element toy-cloud2" onmousedown="playGardenElement('cloud2', event)" ontouchstart="playGardenElement('cloud2', event)">
          ☁️
          <span class="toy-label">Nube</span>
        </div>

        <!-- Big Tree -->
        <div class="toy-element toy-tree" onmousedown="playGardenElement('tree', event)" ontouchstart="playGardenElement('tree', event)">
          🌳
          <span class="toy-label">Árbol</span>
        </div>

        <!-- Bird in the Tree -->
        <div class="toy-element toy-bird" onmousedown="playGardenElement('bird', event)" ontouchstart="playGardenElement('bird', event)">
          🐦
          <span class="toy-label">Pajarito</span>
        </div>

        <!-- Apples in the Tree -->
        <div class="toy-element toy-apple1" onmousedown="playGardenElement('apple1', event)" ontouchstart="playGardenElement('apple1', event)">
          🍎
          <span class="toy-label">Manzana</span>
        </div>
        <div class="toy-element toy-apple2" onmousedown="playGardenElement('apple2', event)" ontouchstart="playGardenElement('apple2', event)">
          🍎
          <span class="toy-label">Manzana</span>
        </div>

        <!-- Pond -->
        <div class="toy-element toy-pond" onmousedown="playGardenElement('pond', event)" ontouchstart="playGardenElement('pond', event)">
          🌊
          <span class="toy-label">Estanque</span>
        </div>

        <!-- Frog by the pond -->
        <div class="toy-element toy-frog" onmousedown="playGardenElement('frog', event)" ontouchstart="playGardenElement('frog', event)">
          🐸
          <span class="toy-label">Ranita</span>
        </div>

        <!-- Mushrooms -->
        <div class="toy-element toy-mushroom1" onmousedown="playGardenElement('mushroom1', event)" ontouchstart="playGardenElement('mushroom1', event)">
          🍄
          <span class="toy-label">Hongo</span>
        </div>
        <div class="toy-element toy-mushroom2" onmousedown="playGardenElement('mushroom2', event)" ontouchstart="playGardenElement('mushroom2', event)">
          🍄
          <span class="toy-label">Hongo</span>
        </div>

        <!-- Ground Flowers -->
        <div class="toy-element toy-flower-red" onmousedown="playGardenElement('flower-red', event)" ontouchstart="playGardenElement('flower-red', event)">
          🌹
          <span class="toy-label">Flor roja</span>
        </div>
        <div class="toy-element toy-flower-yellow" onmousedown="playGardenElement('flower-yellow', event)" ontouchstart="playGardenElement('flower-yellow', event)">
          🌻
          <span class="toy-label">Girasol</span>
        </div>
        <div class="toy-element toy-flower-blue" onmousedown="playGardenElement('flower-blue', event)" ontouchstart="playGardenElement('flower-blue', event)">
          🌷
          <span class="toy-label">Flor azul</span>
        </div>

        <!-- Snail -->
        <div class="toy-element toy-snail" onmousedown="playGardenElement('snail', event)" ontouchstart="playGardenElement('snail', event)">
          🐌
          <span class="toy-label">Caracol</span>
        </div>
      </div>
    </div>
  </main>

  <script>
    // --- Audio Files List (C4 to B4) ---
    const noteFiles = [
      '../music/xylophone/note1.wav', // DO (C4)
      '../music/xylophone/note2.wav', // RE (D4)
      '../music/xylophone/note3.wav', // MI (E4)
      '../music/xylophone/note4.wav', // FA (F4)
      '../music/xylophone/note5.wav', // SOL (G4)
      '../music/xylophone/note6.wav', // LA (A4)
      '../music/xylophone/note7.wav'  // SI (B4)
    ];

    let audioCtx = null;
    let selectedScale = 'pentatonic';
    let selectedTimbre = 'real-xylo';
    let currentMode = 'xylo';

    const audioBuffers = {};
    let soundsLoaded = false;
    let isLoadingSounds = false;

    // Frequencies, base Note index mappings, and color variables
    // noteIndex maps to 1..7 (note1.wav to note7.wav)
    // pitchRate maps playback rate relative to that base file
    const scales = {
      pentatonic: [
        { note: 'DO', freq: 261.63, noteIndex: 1, pitchRate: 1.00, color: '#ef4444' }, // Red
        { note: 'RE', freq: 293.66, noteIndex: 2, pitchRate: 1.00, color: '#f97316' }, // Orange
        { note: 'MI', freq: 329.63, noteIndex: 3, pitchRate: 1.00, color: '#eab308' }, // Yellow
        { note: 'SOL', freq: 392.00, noteIndex: 5, pitchRate: 1.00, color: '#06b6d4' }, // Cyan
        { note: 'LA', freq: 440.00, noteIndex: 6, pitchRate: 1.00, color: '#1d4ed8' }, // Blue
        { note: 'DO', freq: 523.25, noteIndex: 1, pitchRate: 2.00, color: '#ef4444' }  // Red (Agudo: C5 = C4 * 2)
      ],
      major: [
        { note: 'DO', freq: 261.63, noteIndex: 1, pitchRate: 1.00, color: '#ef4444' },
        { note: 'RE', freq: 293.66, noteIndex: 2, pitchRate: 1.00, color: '#f97316' },
        { note: 'MI', freq: 329.63, noteIndex: 3, pitchRate: 1.00, color: '#eab308' },
        { note: 'FA', freq: 349.23, noteIndex: 4, pitchRate: 1.00, color: '#22c55e' },
        { note: 'SOL', freq: 392.00, noteIndex: 5, pitchRate: 1.00, color: '#06b6d4' },
        { note: 'LA', freq: 440.00, noteIndex: 6, pitchRate: 1.00, color: '#1d4ed8' },
        { note: 'SI', freq: 493.88, noteIndex: 7, pitchRate: 1.00, color: '#a855f7' },
        { note: 'DO', freq: 523.25, noteIndex: 1, pitchRate: 2.00, color: '#ef4444' }
      ],
      minor: [
        { note: 'DO', freq: 261.63, noteIndex: 1, pitchRate: 1.00, color: '#ef4444' },
        { note: 'RE', freq: 293.66, noteIndex: 2, pitchRate: 1.00, color: '#f97316' },
        { note: 'MIb', freq: 311.13, noteIndex: 3, pitchRate: 0.9439, color: '#e1a506' }, // Pitch shift MI down a half step
        { note: 'FA', freq: 349.23, noteIndex: 4, pitchRate: 1.00, color: '#22c55e' },
        { note: 'SOL', freq: 392.00, noteIndex: 5, pitchRate: 1.00, color: '#06b6d4' },
        { note: 'LAb', freq: 415.30, noteIndex: 6, pitchRate: 0.9439, color: '#153bb1' }, // Pitch shift LA down
        { note: 'SIb', freq: 466.16, noteIndex: 7, pitchRate: 0.9439, color: '#8c3fe0' }, // Pitch shift SI down
        { note: 'DO', freq: 523.25, noteIndex: 1, pitchRate: 2.00, color: '#ef4444' }
      ]
    };

    // Garden Elements specific tones
    const gardenToys = {
      sun: { note: 'SOL', noteIndex: 5, pitchRate: 2.0, color: '#ffd64b', emoji: '☀️' },         // C5 equivalent (or high G5)
      cloud1: { note: 'MI', noteIndex: 3, pitchRate: 2.0, color: '#38bdf8', emoji: '☁️' },
      cloud2: { note: 'LA', noteIndex: 6, pitchRate: 1.5, color: '#4bc5ff', emoji: '☁️' },
      tree: { note: 'DO', noteIndex: 1, pitchRate: 1.0, color: '#22c55e', emoji: '🌳' },
      bird: { note: 'MI', noteIndex: 3, pitchRate: 2.0, color: '#4ade80', emoji: '🐦' },
      apple1: { note: 'SOL', noteIndex: 5, pitchRate: 1.0, color: '#ef4444', emoji: '🍎' },
      apple2: { note: 'LA', noteIndex: 6, pitchRate: 1.0, color: '#ff4b4b', emoji: '🍎' },
      pond: { note: 'DO', noteIndex: 1, pitchRate: 0.5, color: '#00e5ff', emoji: '🌊' },        // Low C3
      frog: { note: 'RE', noteIndex: 2, pitchRate: 0.5, color: '#4bff79', emoji: '🐸' },
      mushroom1: { note: 'FA', noteIndex: 4, pitchRate: 0.5, color: '#eab308', emoji: '🍄' },
      mushroom2: { note: 'SOL', noteIndex: 5, pitchRate: 0.5, color: '#ff9c4b', emoji: '🍄' },
      'flower-red': { note: 'DO', noteIndex: 1, pitchRate: 1.0, color: '#ef4444', emoji: '🌹' },
      'flower-yellow': { note: 'MI', noteIndex: 3, pitchRate: 1.0, color: '#eab308', emoji: '🌻' },
      'flower-blue': { note: 'FA', noteIndex: 4, pitchRate: 1.0, color: '#06b6d4', emoji: '🌷' },
      snail: { note: 'SI', noteIndex: 7, pitchRate: 1.0, color: '#a855f7', emoji: '🐌' }
    };

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      triggerSoundsLoading();
    }

    async function triggerSoundsLoading() {
      if (isLoadingSounds || soundsLoaded) return;
      isLoadingSounds = true;
      const notice = document.getElementById('loading-notice');
      notice.style.display = 'block';

      for (let i = 0; i < noteFiles.length; i++) {
        try {
          const response = await fetch(noteFiles[i]);
          const arrayBuffer = await response.arrayBuffer();
          const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
          audioBuffers[i + 1] = audioBuffer;
        } catch (e) {
          console.error("Error loading note file:", noteFiles[i], e);
        }
      }
      soundsLoaded = true;
      isLoadingSounds = false;
      notice.style.display = 'none';
    }

    // Play Note dispatcher
    function playSound(noteIndex, rate, fallbackFreq) {
      initAudio();

      // If sounds are loaded, play the real xylophone audio sample!
      if (soundsLoaded && audioBuffers[noteIndex] && selectedTimbre === 'real-xylo') {
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffers[noteIndex];
        source.playbackRate.setValueAtTime(rate, audioCtx.currentTime);
        source.connect(audioCtx.destination);
        source.start(0);
      } else {
        // Fallback to high quality synthesized chimes
        playSynthChime(fallbackFreq);
      }
    }

    // High quality chime synthesis
    function playSynthChime(freq) {
      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      const gainNode2 = audioCtx.createGain();
      
      osc1.connect(gainNode);
      osc2.connect(gainNode2);
      gainNode.connect(audioCtx.destination);
      gainNode2.connect(audioCtx.destination);
      
      const now = audioCtx.currentTime;
      
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(freq, now);
      
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(freq * 2.01, now);
      
      gainNode.gain.setValueAtTime(0.5, now);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
      
      gainNode2.gain.setValueAtTime(0.12, now);
      gainNode2.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
      
      osc1.start(now);
      osc2.start(now);
      
      osc1.stop(now + 1.9);
      osc2.stop(now + 0.7);
    }

    // --- Dynamic DOM Generation ---
    function renderXylophone() {
      const wrapper = document.getElementById('xylo-wrapper');
      wrapper.innerHTML = '';
      
      const bars = scales[selectedScale];
      bars.forEach((bar, index) => {
        const barElem = document.createElement('div');
        barElem.className = 'xylo-bar';
        barElem.style.backgroundColor = bar.color;
        
        // Slightly decrease height for higher pitches (like a real instrument)
        const heightPercent = 100 - (index * 4);
        barElem.style.height = `${heightPercent}%`;
        
        const label = document.createElement('span');
        label.className = 'xylo-label';
        label.innerText = bar.note;
        
        barElem.appendChild(label);
        
        // Touch & Mouse triggers
        const trigger = (e) => {
          e.preventDefault();
          barElem.classList.add('active-touch');
          setTimeout(() => barElem.classList.remove('active-touch'), 100);
          
          playSound(bar.noteIndex, bar.pitchRate, bar.freq);
          
          // Capture coordinates for particles
          const rect = barElem.getBoundingClientRect();
          const x = rect.left + rect.width / 2;
          const y = rect.top + rect.height / 2;
          spawnParticles(x, y, bar.color);
          spawnNoteBubble(x, y, bar.note, bar.color);
        };

        barElem.addEventListener('mousedown', trigger);
        barElem.addEventListener('touchstart', trigger);

        wrapper.appendChild(barElem);
      });
    }

    function setScale(scaleName) {
      selectedScale = scaleName;
      document.getElementById('btn-scale-pentatonic').classList.remove('active');
      document.getElementById('btn-scale-major').classList.remove('active');
      document.getElementById('btn-scale-minor').classList.remove('active');
      document.getElementById(`btn-scale-${scaleName}`).classList.add('active');
      
      if (currentMode === 'xylo') {
        renderXylophone();
      }
    }

    function setTimbre(timbreName) {
      selectedTimbre = timbreName;
      document.getElementById('btn-timbre-real-xylo').classList.remove('active');
      document.getElementById('btn-timbre-bell').classList.remove('active');
      document.getElementById(`btn-timbre-${timbreName}`).classList.add('active');
    }

    function setMode(modeName) {
      currentMode = modeName;
      document.getElementById('btn-mode-xylo').classList.remove('active');
      document.getElementById('btn-mode-forest').classList.remove('active');
      document.getElementById(`btn-mode-${modeName}`).classList.add('active');

      if (modeName === 'xylo') {
        document.getElementById('xylo-wrapper').style.display = 'flex';
        document.getElementById('forest-wrapper').style.display = 'none';
        document.getElementById('instrument-control-group').style.opacity = '1';
        document.getElementById('instrument-control-group').style.pointerEvents = 'auto';
        renderXylophone();
      } else {
        document.getElementById('xylo-wrapper').style.display = 'none';
        document.getElementById('forest-wrapper').style.display = 'block';
        document.getElementById('instrument-control-group').style.opacity = '0.4';
        document.getElementById('instrument-control-group').style.pointerEvents = 'none';
        
        // Force loading real sounds if they switch to garden
        initAudio();
      }
    }

    // Play specific garden toys
    function playGardenElement(elementKey, event) {
      event.preventDefault();
      const toy = gardenToys[elementKey];
      if (!toy) return;

      // Xylophone is forced in garden mode
      playSound(toy.noteIndex, toy.pitchRate, 261.63 * toy.pitchRate);

      // Extract touch/mouse coords
      let clientX, clientY;
      if (event.touches && event.touches[0]) {
        clientX = event.touches[0].clientX;
        clientY = event.touches[0].clientY;
      } else {
        clientX = event.clientX;
        clientY = event.clientY;
      }

      // Visual tap bounce on element
      const el = event.currentTarget;
      el.style.transform = 'scale(1.4) rotate(15deg)';
      setTimeout(() => el.style.transform = 'scale(1) rotate(0deg)', 300);

      // Spawn elements based on tapped object
      spawnParticles(clientX, clientY, toy.color);
      spawnNoteBubble(clientX, clientY, toy.note, toy.color);
      
      // Spawn floating emojis
      const pool = [toy.emoji, '✨', '🎈', '🌸', '🦋'];
      const chosenEmoji = pool[Math.floor(Math.random() * pool.length)];
      spawnGardenEmoji(clientX, clientY, chosenEmoji);
    }

    // --- Particle Physics Effects Engine ---
    const canvas = document.getElementById('effects-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      const sandbox = document.getElementById('play-sandbox');
      canvas.width = sandbox.clientWidth;
      canvas.height = sandbox.clientHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 300);

    class Particle {
      constructor(x, y, color) {
        const rect = canvas.getBoundingClientRect();
        this.x = x - rect.left;
        this.y = y - rect.top;
        this.color = color;
        this.size = Math.random() * 12 + 6;
        this.speedX = Math.random() * 8 - 4;
        this.speedY = Math.random() * 8 - 4;
        this.gravity = 0.12;
        this.alpha = 1;
        this.decay = Math.random() * 0.02 + 0.015;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.speedY += this.gravity;
        this.alpha -= this.decay;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.restore();
      }
    }

    function spawnParticles(x, y, color) {
      for (let i = 0; i < 15; i++) {
        particles.push(new Particle(x, y, color));
      }
    }

    function spawnNoteBubble(x, y, noteName, noteColor) {
      const bubble = document.createElement('div');
      bubble.className = 'note-bubble';
      bubble.style.borderColor = noteColor;
      bubble.innerText = noteName;
      
      const sandboxRect = document.getElementById('play-sandbox').getBoundingClientRect();
      bubble.style.left = `${x - sandboxRect.left}px`;
      bubble.style.top = `${y - sandboxRect.top}px`;

      document.getElementById('play-sandbox').appendChild(bubble);
      setTimeout(() => bubble.remove(), 800);
    }

    function spawnGardenEmoji(x, y, emoji) {
      const el = document.createElement('div');
      el.style.position = 'absolute';
      el.style.pointerEvents = 'none';
      el.style.fontSize = `${Math.random() * 1.5 + 1.8}rem`;
      el.style.zIndex = '10';
      el.innerText = emoji;
      
      const sandboxRect = document.getElementById('play-sandbox').getBoundingClientRect();
      el.style.left = `${x - sandboxRect.left}px`;
      el.style.top = `${y - sandboxRect.top}px`;
      
      document.getElementById('play-sandbox').appendChild(el);
      
      let speedY = Math.random() * -4 - 3;
      let speedX = Math.random() * 6 - 3;
      let opacity = 1;
      let scale = 1;
      let rot = 0;
      let rotSpeed = Math.random() * 12 - 6;
      
      function step() {
        speedY += 0.08;
        const curTop = parseFloat(el.style.top);
        const curLeft = parseFloat(el.style.left);
        
        el.style.top = `${curTop + speedY}px`;
        el.style.left = `${curLeft + speedX}px`;
        el.style.transform = `rotate(${rot}deg) scale(${scale})`;
        el.style.opacity = opacity;
        
        rot += rotSpeed;
        opacity -= 0.02;
        scale -= 0.01;
        
        if (opacity > 0) {
          requestAnimationFrame(step);
        } else {
          el.remove();
        }
      }
      requestAnimationFrame(step);
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        
        if (particles[i].alpha <= 0) {
          particles.splice(i, 1);
        }
      }
      requestAnimationFrame(animate);
    }

    // Initialize Loops
    renderXylophone();
    animate();
  </script>
</body>
</html>
