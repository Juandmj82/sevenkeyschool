<html lang="es">
<head>
  <!-- Microsoft Clarity Tracking Code -->
  <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "xfop6mj4wx");
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Seven Keys School | Cielo y Tierra</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background: #020617;
      height: 100vh;
      max-height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    header {
      padding: 0.8rem 1.5rem;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(8px);
      z-index: 20;
      position: relative;
    }

    .header-logo {
      height: 48px;
      width: auto;
    }

    .stimulation-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0.5rem 1rem 1rem 1rem;
      position: relative;
    }

    /* Top Controls Panel */
    .controls-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 0.6rem 1.2rem;
      border-radius: 16px;
      z-index: 10;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .control-label {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .btn-toggle-group {
      display: flex;
      background: rgba(0, 0, 0, 0.25);
      padding: 3px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .btn-toggle {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 700;
      border-radius: 9px;
      cursor: pointer;
      transition: var(--transition-smooth);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-toggle.active {
      background: var(--color-gold);
      color: #020617;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.25);
    }

    .btn-toggle:hover:not(.active) {
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
    }

    /* Main Sandbox Play Area */
    .sandbox-area {
      flex: 1;
      width: 100%;
      background: #020617;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    #effects-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    /* Split Screen Layout (Cielo y Tierra) */
    .split-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      z-index: 1;
      position: relative;
    }

    .zone-half {
      flex: 1;
      width: 100%;
      position: relative;
      transition: background 0.3s ease;
      touch-action: none;
    }

    /* Cielo (High sound zone) */
    .zone-sky-half {
      background: linear-gradient(to bottom, #060b18 0%, #111d40 100%);
      border-bottom: 2px solid rgba(255, 255, 255, 0.05);
    }

    /* Tierra (Low sound zone) */
    .zone-ground-half {
      background: linear-gradient(to bottom, #2b1409 0%, #131110 100%);
    }

    /* Background graphics */
    .zone-graphics {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      opacity: 0.5;
    }

    /* Interactive Toy Elements */
    .toy-element {
      position: absolute;
      cursor: pointer;
      z-index: 3;
      touch-action: none;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    }

    /* Clean coordinate distribution to prevent overlaps */
    .toy-sun { top: 8%; right: 6%; width: 85px; height: 85px; }
    .toy-cloud1 { top: 10%; left: 6%; width: 110px; height: 60px; }
    .toy-cloud2 { top: 24%; left: 20%; width: 95px; height: 50px; }
    .toy-bird { top: 10%; left: 46%; width: 60px; height: 60px; }
    .toy-butterfly { top: 22%; right: 26%; width: 55px; height: 55px; }
    
    .toy-star1 { top: 6%; left: 32%; width: 40px; height: 40px; }
    .toy-star2 { top: 22%; left: 56%; width: 40px; height: 40px; }
    .toy-star3 { top: 8%; right: 38%; width: 40px; height: 40px; }

    /* Ground elements coordinates */
    .toy-drum { bottom: 10%; left: 24%; width: 90px; height: 90px; }
    .toy-mushroom { bottom: 12%; left: 45%; width: 60px; height: 70px; }
    .toy-frog { bottom: 12%; right: 24%; width: 70px; height: 70px; }
    .toy-flower1 { bottom: 8%; left: 8%; width: 60px; height: 90px; }
    .toy-flower2 { bottom: 10%; right: 8%; width: 60px; height: 90px; }
    .toy-snail { bottom: 6%; left: 58%; width: 70px; height: 55px; }

    /* --- Custom Animations triggered on Tap / Play --- */
    .anim-pulse {
      animation: spinPulse 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes spinPulse {
      0% { transform: scale(1) rotate(0deg); filter: brightness(1); }
      50% { transform: scale(1.25) rotate(15deg); filter: brightness(1.4); }
      100% { transform: scale(1) rotate(0deg); filter: brightness(1); }
    }

    .anim-float {
      animation: cloudFloat 0.6s cubic-bezier(0.455, 0.03, 0.515, 0.955);
    }
    @keyframes cloudFloat {
      0% { transform: translateX(0) scale(1); }
      50% { transform: translateX(15px) scale(1.1); filter: brightness(1.2); }
      100% { transform: translateX(0) scale(1); }
    }

    .anim-hop {
      animation: birdHop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes birdHop {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-25px) scale(1.2) rotate(-5deg); }
      100% { transform: translateY(0) scale(1); }
    }

    .anim-flutter {
      animation: butterflyFlutter 0.6s ease-in-out;
    }
    @keyframes butterflyFlutter {
      0% { transform: scale(1) rotate(0deg); }
      30% { transform: scale(1.2) rotate(-15deg); }
      70% { transform: scale(1.2) rotate(15deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .anim-bounce {
      animation: drumBounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes drumBounce {
      0% { transform: scale(1); }
      30% { transform: scale(1.2, 0.8); } /* squash */
      60% { transform: scale(0.9, 1.2); } /* stretch */
      100% { transform: scale(1); }
    }

    .anim-sway {
      animation: flowerSway 0.6s ease-in-out;
    }
    @keyframes flowerSway {
      0% { transform: rotate(0deg); }
      33% { transform: rotate(-15deg) scale(1.1); }
      66% { transform: rotate(15deg) scale(1.1); }
      100% { transform: rotate(0deg); }
    }

    .anim-slide {
      animation: snailSlide 0.6s ease-in-out;
    }
    @keyframes snailSlide {
      0% { transform: translateX(0); }
      50% { transform: translateX(20px) scale(1.1); }
      100% { transform: translateX(0); }
    }

    /* Target indicator glow for Level 1 */
    .glow-guide-active {
      filter: drop-shadow(0 0 25px var(--glow-color)) brightness(1.3) !important;
      transform: scale(1.15);
    }

    /* Wrong choice pulse */
    .guide-pulse-wrong {
      animation: wrongPulse 0.4s 3 ease-in-out;
    }
    @keyframes wrongPulse {
      0%, 100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.18); filter: drop-shadow(0 0 20px var(--glow-color)) brightness(1.3); }
    }

    /* Play/Listen button in the middle */
    .challenge-center-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--color-gold);
      color: #020617;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
      z-index: 10;
      cursor: pointer;
      border: 4px solid #ffffff;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .challenge-center-button:active {
      transform: translate(-50%, -50%) scale(1.15);
    }

    .challenge-center-button i {
      font-size: 2.2rem;
    }

    /* Star decoration background */
    .bg-glowing-star {
      position: absolute;
      color: rgba(255, 255, 255, 0.08);
      font-size: 0.7rem;
      pointer-events: none;
      animation: flashStar 3s infinite ease-in-out;
    }

    @keyframes flashStar {
      0%, 100% { opacity: 0.1; transform: scale(0.8); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    /* Loading notice */
    .loading-notice {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1.5rem 2.5rem;
      border-radius: 20px;
      text-align: center;
      z-index: 100;
      pointer-events: none;
      display: none;
    }

    .loading-notice p {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .loading-notice .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid var(--color-gold);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Floating particles */
    .glowing-emoji {
      position: absolute;
      pointer-events: none;
      font-size: 2.5rem;
      z-index: 4;
    }

    @media (max-width: 768px) {
      .stimulation-container {
        padding: 0.5rem;
      }
      .controls-panel {
        flex-direction: column;
        gap: 0.6rem;
        padding: 0.6rem;
      }
      .toy-element {
        transform: scale(0.72);
      }
      .toy-element:hover {
        transform: scale(0.72);
      }
      /* Mobile coordinates to prevent overlaps */
      .toy-sun { top: 5%; right: 2%; }
      .toy-cloud1 { top: 5%; left: 2%; }
      .toy-cloud2 { top: 18%; left: 16%; }
      .toy-bird { top: 6%; left: 38%; }
      .toy-butterfly { top: 18%; right: 20%; }
      .toy-star1 { top: 5%; left: 26%; }
      .toy-star2 { top: 22%; left: 45%; }
      .toy-star3 { top: 8%; right: 32%; }
      .toy-drum { bottom: 5%; left: 15%; }
      .toy-mushroom { bottom: 6%; left: 38%; }
      .toy-frog { bottom: 5%; right: 15%; }
      .toy-flower1 { bottom: 4%; left: 2%; }
      .toy-flower2 { bottom: 6%; right: 2%; }
      .toy-snail { bottom: 4%; left: 52%; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-container">
      <img src="../img/logo.png" alt="Seven Keys School" class="header-logo">
    </div>
    <a href="index.html" class="btn-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Volver a Juegos
    </a>
  </header>

  <main class="stimulation-container">
    <!-- Game Mode Controls -->
    <div class="controls-panel">
      <div class="control-group">
        <span class="control-label">Nivel:</span>
        <div class="btn-toggle-group">
          <button class="btn-toggle active" id="btn-mode-learn" onclick="setMode('learn')">
            <i class="fas fa-eye"></i> Nivel 1: Descubrir
          </button>
          <button class="btn-toggle" id="btn-mode-challenge" onclick="setMode('challenge')">
            <i class="fas fa-question-circle"></i> Nivel 2: El Reto
          </button>
        </div>
      </div>

      <div class="control-group">
        <span class="control-label">Sonido:</span>
        <div class="btn-toggle-group">
          <button class="btn-toggle active" id="btn-sound-chime" onclick="setSoundType('chime')">
            ✨ Campanas
          </button>
          <button class="btn-toggle" id="btn-sound-marimba" onclick="setSoundType('marimba')">
            🪵 Xilófono
          </button>
        </div>
      </div>
    </div>

    <!-- Sandbox Play Area -->
    <div class="sandbox-area" id="play-sandbox">
      <canvas id="effects-canvas"></canvas>

      <!-- Loading notice -->
      <div class="loading-notice" id="loading-notice">
        <p>Cargando sonidos reales...</p>
        <div class="spinner"></div>
      </div>

      <!-- Play Button for Challenge / Listening -->
      <button class="challenge-center-button" id="btn-listen" onclick="playChallengeSound()" aria-label="Escuchar Sonido">
        <i class="fas fa-volume-up"></i>
      </button>

      <!-- Split Screen Layout -->
      <div class="split-container">
        <!-- Sky (High Note Zone) -->
        <div class="zone-half zone-sky-half" id="zone-sky">
          <div class="zone-graphics">
            <span class="bg-glowing-star" style="top: 15%; left: 18%;">⭐</span>
            <span class="bg-glowing-star" style="top: 30%; left: 40%;">⭐</span>
            <span class="bg-glowing-star" style="top: 22%; left: 88%;">⭐</span>
          </div>

          <!-- Sun Vector -->
          <div class="toy-element toy-sun" id="toy-sun" style="--glow-color: rgba(251, 191, 36, 0.8);" onmousedown="onElementTap('sun', event)" ontouchstart="onElementTap('sun', event)">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
              <circle cx="50" cy="50" r="24" fill="#fbbf24" filter="drop-shadow(0 0 12px #f59e0b)" />
              <path d="M50 8 L50 20 M50 80 L50 92 M8 50 L20 50 M80 50 L92 50 M20 20 L29 29 M71 71 L80 80 M20 80 L29 71 M71 29 L80 20" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" />
            </svg>
          </div>

          <!-- Clouds Vectors -->
          <div class="toy-element toy-cloud1" id="toy-cloud1" style="--glow-color: rgba(56, 189, 248, 0.6);" onmousedown="onElementTap('cloud1', event)" ontouchstart="onElementTap('cloud1', event)">
            <svg viewBox="0 0 100 60" width="100%" height="100%">
              <path d="M10 45 A 20 20 0 0 1 35 25 A 25 25 0 0 1 75 25 A 18 18 0 0 1 90 45 Z" fill="#e2e8f0" opacity="0.9" />
            </svg>
          </div>
          <div class="toy-element toy-cloud2" id="toy-cloud2" style="--glow-color: rgba(56, 189, 248, 0.5);" onmousedown="onElementTap('cloud2', event)" ontouchstart="onElementTap('cloud2', event)">
            <svg viewBox="0 0 100 60" width="100%" height="100%">
              <path d="M10 45 A 16 16 0 0 1 30 28 A 20 20 0 0 1 70 28 A 15 15 0 0 1 90 45 Z" fill="#e2e8f0" opacity="0.8" />
            </svg>
          </div>

          <!-- Flying Bird -->
          <div class="toy-element toy-bird" id="toy-bird" style="--glow-color: rgba(96, 165, 250, 0.7);" onmousedown="onElementTap('bird', event)" ontouchstart="onElementTap('bird', event)">
            <svg viewBox="0 0 60 60" width="100%" height="100%">
              <circle cx="30" cy="30" r="18" fill="#3b82f6" />
              <circle cx="42" cy="22" r="7" fill="#60a5fa" />
              <polygon points="48,20 56,24 48,28" fill="#f59e0b" />
              <circle cx="42" cy="20" r="1.8" fill="#000" />
              <path d="M12 28 Q 6 34 12 40 Z" fill="#1d4ed8" />
            </svg>
          </div>

          <!-- Flying Butterfly -->
          <div class="toy-element toy-butterfly" id="toy-butterfly" style="--glow-color: rgba(232, 121, 249, 0.7);" onmousedown="onElementTap('butterfly', event)" ontouchstart="onElementTap('butterfly', event)">
            <svg viewBox="0 0 60 60" width="100%" height="100%">
              <ellipse cx="20" cy="25" rx="12" ry="16" fill="#e879f9" />
              <ellipse cx="22" cy="38" rx="8" ry="10" fill="#f472b6" />
              <ellipse cx="40" cy="25" rx="12" ry="16" fill="#e879f9" />
              <ellipse cx="38" cy="38" rx="8" ry="10" fill="#f472b6" />
              <rect x="28" y="15" width="4" height="30" rx="2" fill="#475569" />
            </svg>
          </div>

          <!-- Star Elements -->
          <div class="toy-element toy-star1" id="toy-star1" style="--glow-color: rgba(251, 191, 36, 0.8);" onmousedown="onElementTap('star1', event)" ontouchstart="onElementTap('star1', event)">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
              <path d="M50 5 L63 36 L96 38 L71 60 L78 93 L50 75 L22 93 L29 60 L4 38 L37 36 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="3" stroke-linejoin="round" />
            </svg>
          </div>
          <div class="toy-element toy-star2" id="toy-star2" style="--glow-color: rgba(251, 191, 36, 0.8);" onmousedown="onElementTap('star2', event)" ontouchstart="onElementTap('star2', event)">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
              <path d="M50 5 L63 36 L96 38 L71 60 L78 93 L50 75 L22 93 L29 60 L4 38 L37 36 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="3" stroke-linejoin="round" />
            </svg>
          </div>
          <div class="toy-element toy-star3" id="toy-star3" style="--glow-color: rgba(251, 191, 36, 0.8);" onmousedown="onElementTap('star3', event)" ontouchstart="onElementTap('star3', event)">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
              <path d="M50 5 L63 36 L96 38 L71 60 L78 93 L50 75 L22 93 L29 60 L4 38 L37 36 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="3" stroke-linejoin="round" />
            </svg>
          </div>
        </div>

        <!-- Ground (Low Note Zone) -->
        <div class="zone-half zone-ground-half" id="zone-ground">
          <div class="zone-graphics">
            <span class="bg-glowing-star" style="bottom: 12%; left: 16%;">⭐</span>
            <span class="bg-glowing-star" style="bottom: 28%; left: 50%;">⭐</span>
            <span class="bg-glowing-star" style="bottom: 18%; left: 84%;">⭐</span>
          </div>

          <!-- Drum Vector -->
          <div class="toy-element toy-drum" id="toy-drum" style="--glow-color: rgba(251, 146, 60, 0.7);" onmousedown="onElementTap('drum', event)" ontouchstart="onElementTap('drum', event)">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
              <path d="M15 25 L15 80 C15 95 85 95 85 80 L85 25 Z" fill="#b45309" stroke="#78350f" stroke-width="4" />
              <path d="M15 45 L85 45 M15 65 L85 65" stroke="#78350f" stroke-width="4" />
              <ellipse cx="50" cy="25" rx="35" ry="10" fill="#fed7aa" stroke="#78350f" stroke-width="4" />
            </svg>
          </div>

          <!-- Mushroom Vector -->
          <div class="toy-element toy-mushroom" id="toy-mushroom" style="--glow-color: rgba(239, 68, 68, 0.7);" onmousedown="onElementTap('mushroom', event)" ontouchstart="onElementTap('mushroom', event)">
            <svg viewBox="0 0 50 60" width="100%" height="100%">
              <path d="M18 60 C18 40 32 40 32 60 Z" fill="#e2e8f0" />
              <path d="M5 36 C5 15 45 15 45 36 Z" fill="#ef4444" />
              <circle cx="15" cy="24" r="3" fill="#fff" />
              <circle cx="25" cy="20" r="4" fill="#fff" />
              <circle cx="35" cy="26" r="3" fill="#fff" />
            </svg>
          </div>

          <!-- Frog Vector -->
          <div class="toy-element toy-frog" id="toy-frog" style="--glow-color: rgba(34, 197, 94, 0.7);" onmousedown="onElementTap('frog', event)" ontouchstart="onElementTap('frog', event)">
            <svg viewBox="0 0 60 60" width="100%" height="100%">
              <ellipse cx="30" cy="35" rx="22" ry="18" fill="#22c55e" />
              <circle cx="18" cy="18" r="8" fill="#22c55e" />
              <circle cx="18" cy="18" r="5" fill="#fff" />
              <circle cx="18" cy="18" r="2.5" fill="#000" />
              <circle cx="42" cy="18" r="8" fill="#22c55e" />
              <circle cx="42" cy="18" r="5" fill="#fff" />
              <circle cx="42" cy="18" r="2.5" fill="#000" />
              <path d="M20 40 Q 30 48 40 40" stroke="#15803d" stroke-width="3" fill="none" stroke-linecap="round" />
            </svg>
          </div>

          <!-- Flowers Vectors -->
          <div class="toy-element toy-flower1" id="toy-flower1" style="--glow-color: rgba(236, 72, 153, 0.7);" onmousedown="onElementTap('flower1', event)" ontouchstart="onElementTap('flower1', event)">
            <svg viewBox="0 0 50 80" width="100%" height="100%">
              <rect x="23" y="35" width="4" height="45" fill="#166534" />
              <circle cx="25" cy="25" r="10" fill="#ec4899" />
              <circle cx="15" cy="25" r="8" fill="#db2777" />
              <circle cx="35" cy="25" r="8" fill="#db2777" />
              <circle cx="25" cy="15" r="8" fill="#db2777" />
              <circle cx="25" cy="35" r="8" fill="#db2777" />
              <circle cx="25" cy="25" r="5" fill="#f59e0b" />
            </svg>
          </div>
          <div class="toy-element toy-flower2" id="toy-flower2" style="--glow-color: rgba(6, 182, 212, 0.7);" onmousedown="onElementTap('flower2', event)" ontouchstart="onElementTap('flower2', event)">
            <svg viewBox="0 0 50 80" width="100%" height="100%">
              <rect x="23" y="35" width="4" height="45" fill="#166534" />
              <path d="M12 35 C12 15 38 15 38 35 Z" fill="#06b6d4" />
              <path d="M18 35 C18 20 32 20 32 35 Z" fill="#22d3ee" />
            </svg>
          </div>

          <!-- Snail Vector -->
          <div class="toy-element toy-snail" id="toy-snail" style="--glow-color: rgba(168, 85, 247, 0.7);" onmousedown="onElementTap('snail', event)" ontouchstart="onElementTap('snail', event)">
            <svg viewBox="0 0 80 60" width="100%" height="100%">
              <path d="M10 50 Q 40 45 70 50 Q 75 42 70 35 L 60 35 C 50 35 40 40 30 42 Z" fill="#d97706" />
              <circle cx="38" cy="32" r="20" fill="#a855f7" stroke="#581c87" stroke-width="2" />
              <circle cx="38" cy="32" r="14" fill="#c084fc" stroke="#581c87" stroke-width="1.5" />
              <line x1="68" y1="36" x2="72" y2="24" stroke="#d97706" stroke-width="3" stroke-linecap="round" />
              <line x1="64" y1="36" x2="66" y2="22" stroke="#d97706" stroke-width="3" stroke-linecap="round" />
            </svg>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // --- Audio setup ---
    const noteFiles = [
      '../music/xylophone/note1.wav', // DO4 (C4)
      '../music/xylophone/note7.wav'  // SI4 (B4)
    ];

    let audioCtx = null;
    let selectedSound = 'chime';
    let currentMode = 'learn'; // 'learn' or 'challenge'

    const audioBuffers = {};
    let soundsLoaded = false;
    let isLoadingSounds = false;

    // Challenge & State variables
    let currentTargetElement = null; // Key from toyDetails
    let isWaitingForAnswer = false;

    // Detailed Element Configurations (Unique Frequencies & Animations)
    const toyDetails = {
      // --- SKY (HIGH NOTES) ---
      sun: {
        height: 'sky',
        noteIndex: 7,
        pitchRate: 1.5, // High B5/C6
        synthFreq: 987.77,
        color: '#fbbf24',
        emoji: '☀️',
        animClass: 'anim-pulse'
      },
      cloud1: {
        height: 'sky',
        noteIndex: 7,
        pitchRate: 1.15,
        synthFreq: 783.99,
        color: '#e2e8f0',
        emoji: '☁️',
        animClass: 'anim-float'
      },
      cloud2: {
        height: 'sky',
        noteIndex: 7,
        pitchRate: 1.25,
        synthFreq: 880.00,
        color: '#cbd5e1',
        emoji: '☁️',
        animClass: 'anim-float'
      },
      bird: {
        height: 'sky',
        noteIndex: 7,
        pitchRate: 1.8, // Double chirp representation in audio logic
        synthFreq: 1174.66,
        color: '#3b82f6',
        emoji: '🐦',
        animClass: 'anim-hop'
      },
      butterfly: {
        height: 'sky',
        noteIndex: 7,
        pitchRate: 1.4,
        synthFreq: 932.33,
        color: '#e879f9',
        emoji: '🦋',
        animClass: 'anim-flutter'
      },
      star1: {
        height: 'sky',
        noteIndex: 7,
        pitchRate: 1.3,
        synthFreq: 1046.50,
        color: '#fbbf24',
        emoji: '⭐',
        animClass: 'anim-pulse'
      },
      star2: {
        height: 'sky',
        noteIndex: 7,
        pitchRate: 1.6,
        synthFreq: 1244.51,
        color: '#fbbf24',
        emoji: '⭐',
        animClass: 'anim-pulse'
      },
      star3: {
        height: 'sky',
        noteIndex: 7,
        pitchRate: 2.0,
        synthFreq: 1396.91,
        color: '#fbbf24',
        emoji: '⭐',
        animClass: 'anim-pulse'
      },

      // --- GROUND (LOW NOTES) ---
      drum: {
        height: 'ground',
        noteIndex: 1,
        pitchRate: 0.5, // Low bass
        synthFreq: 130.81,
        color: '#fb923c',
        emoji: '🥁',
        animClass: 'anim-bounce'
      },
      mushroom: {
        height: 'ground',
        noteIndex: 1,
        pitchRate: 0.7,
        synthFreq: 185.00,
        color: '#ef4444',
        emoji: '🍄',
        animClass: 'anim-hop'
      },
      frog: {
        height: 'ground',
        noteIndex: 1,
        pitchRate: 0.4, // Deep slide
        synthFreq: 110.00,
        color: '#22c55e',
        emoji: '🐸',
        animClass: 'anim-hop'
      },
      flower1: {
        height: 'ground',
        noteIndex: 1,
        pitchRate: 0.8,
        synthFreq: 220.00,
        color: '#ec4899',
        emoji: '🌸',
        animClass: 'anim-sway'
      },
      flower2: {
        height: 'ground',
        noteIndex: 1,
        pitchRate: 0.9,
        synthFreq: 246.94,
        color: '#06b6d4',
        emoji: '🌷',
        animClass: 'anim-sway'
      },
      snail: {
        height: 'ground',
        noteIndex: 1,
        pitchRate: 0.6,
        synthFreq: 164.81,
        color: '#a855f7',
        emoji: '🐌',
        animClass: 'anim-slide'
      }
    };

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      triggerSoundsLoading();
    }

    async function triggerSoundsLoading() {
      if (isLoadingSounds || soundsLoaded) return;
      isLoadingSounds = true;
      const notice = document.getElementById('loading-notice');
      notice.style.display = 'block';

      try {
        const response1 = await fetch(noteFiles[0]);
        const arrayBuffer1 = await response1.arrayBuffer();
        audioBuffers[1] = await audioCtx.decodeAudioData(arrayBuffer1);

        const response2 = await fetch(noteFiles[1]);
        const arrayBuffer2 = await response2.arrayBuffer();
        audioBuffers[7] = await audioCtx.decodeAudioData(arrayBuffer2);
        
        soundsLoaded = true;
      } catch (e) {
        console.error("Error loading note files:", e);
      }

      isLoadingSounds = false;
      notice.style.display = 'none';
    }

    // Play specific element sound
    function playElementSound(toyKey) {
      initAudio();
      const details = toyDetails[toyKey];
      if (!details) return;

      // Special sound synthesis effects for animals to make them cute
      if (toyKey === 'bird') {
        // Double chirp sound
        const now = audioCtx.currentTime;
        playSingleFrequency(details.synthFreq, now, 0.08);
        playSingleFrequency(details.synthFreq * 1.15, now + 0.09, 0.12);
        return;
      }
      if (toyKey === 'frog') {
        // Frog croak slide
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sawtooth'; // raspy croak tone
        osc.frequency.setValueAtTime(details.synthFreq * 1.5, now);
        osc.frequency.linearRampToValueAtTime(details.synthFreq * 0.8, now + 0.22);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.23);
        osc.start(now);
        osc.stop(now + 0.25);
        return;
      }
      if (toyKey === 'snail') {
        // Snail sliding rising pitch
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(details.synthFreq, now);
        osc.frequency.linearRampToValueAtTime(details.synthFreq * 1.4, now + 0.4);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now);
        osc.stop(now + 0.42);
        return;
      }

      // Standard real marimba or synth chime playback
      if (soundsLoaded && audioBuffers[details.noteIndex] && selectedSound === 'marimba') {
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffers[details.noteIndex];
        source.playbackRate.setValueAtTime(details.pitchRate, audioCtx.currentTime);
        source.connect(audioCtx.destination);
        source.start(0);
      } else {
        playSynthChime(details.synthFreq);
      }
    }

    function playSingleFrequency(freq, time, duration) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, time);
      gain.gain.setValueAtTime(0.25, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + duration - 0.01);
      osc.start(time);
      osc.stop(time + duration);
    }

    function playSynthChime(freq) {
      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      const gainNode2 = audioCtx.createGain();
      
      osc1.connect(gainNode);
      osc2.connect(gainNode2);
      gainNode.connect(audioCtx.destination);
      gainNode2.connect(audioCtx.destination);
      
      const now = audioCtx.currentTime;
      
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(freq, now);
      
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(freq * 2.01, now);
      
      gainNode.gain.setValueAtTime(0.4, now);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.6);
      
      gainNode2.gain.setValueAtTime(0.1, now);
      gainNode2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      
      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + 1.7);
      osc2.stop(now + 0.6);
    }

    function playSuccessChime() {
      const now = audioCtx.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.50];
      notes.forEach((freq, idx) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now + (idx * 0.08));
        
        gain.gain.setValueAtTime(0.3, now + (idx * 0.08));
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8 + (idx * 0.08));
        
        osc.start(now + (idx * 0.08));
        osc.stop(now + 0.9 + (idx * 0.08));
      });
    }

    function playFailChime() {
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(220.00, now);
      osc.frequency.linearRampToValueAtTime(180.00, now + 0.25);
      
      gain.gain.setValueAtTime(0.4, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      
      osc.start(now);
      osc.stop(now + 0.4);
    }

    // --- Interaction routing ---
    function onElementTap(toyKey, event) {
      event.preventDefault();
      
      let clientX, clientY;
      if (event.touches && event.touches[0]) {
        clientX = event.touches[0].clientX;
        clientY = event.touches[0].clientY;
      } else {
        clientX = event.clientX;
        clientY = event.clientY;
      }

      const details = toyDetails[toyKey];
      if (!details) return;

      triggerElementAnimation(toyKey);

      if (currentMode === 'learn') {
        // Nivel 1: play sound, trigger animation and guide glow, spawn particles
        playElementSound(toyKey);
        triggerGuideGlow(toyKey);
        
        spawnParticles(clientX, clientY, details.color);
        spawnFloatingEmoji(clientX, clientY, details.emoji);
      } else {
        // Nivel 2: Guessing mode
        if (!isWaitingForAnswer) return;
        isWaitingForAnswer = false;

        const btnListen = document.getElementById('btn-listen');

        if (toyKey === currentTargetElement) {
          // Success! Matches exact sound
          playSuccessChime();
          
          btnListen.style.background = '#10b981'; // Green
          btnListen.querySelector('i').className = 'fas fa-check';
          
          spawnParticles(clientX, clientY, '#10b981');
          for (let i = 0; i < 6; i++) {
            setTimeout(() => {
              spawnFloatingEmoji(clientX + (Math.random() * 80 - 40), clientY + (Math.random() * 80 - 40), details.emoji);
            }, i * 50);
          }

          // Next round
          setTimeout(() => {
            resetChallengeUI();
            playChallengeSound();
          }, 1800);
        } else {
          // Wrong choice - show correct element
          playFailChime();
          
          btnListen.style.background = '#ef4444'; // Red
          btnListen.querySelector('i').className = 'fas fa-volume-up';

          // Pulse the CORRECT element
          const correctEl = document.getElementById(`toy-${currentTargetElement}`);
          correctEl.classList.add('guide-pulse-wrong');
          setTimeout(() => correctEl.classList.remove('guide-pulse-wrong'), 1600);

          // Retry
          setTimeout(() => {
            btnListen.style.background = 'var(--color-gold)';
            isWaitingForAnswer = true;
          }, 1200);
        }
      }
    }

    // Triggers element custom animation
    function triggerElementAnimation(toyKey) {
      const details = toyDetails[toyKey];
      const el = document.getElementById(`toy-${toyKey}`);
      el.classList.add(details.animClass);
      setTimeout(() => el.classList.remove(details.animClass), 600);
    }

    // Level 1 helper: glows target element
    function triggerGuideGlow(toyKey) {
      const el = document.getElementById(`toy-${toyKey}`);
      el.classList.add('glow-guide-active');
      setTimeout(() => el.classList.remove('glow-guide-active'), 1000);
    }

    // --- Mode Select ---
    function setMode(modeName) {
      currentMode = modeName;
      document.getElementById('btn-mode-learn').classList.remove('active');
      document.getElementById('btn-mode-challenge').classList.remove('active');
      document.getElementById(`btn-mode-${modeName}`).classList.add('active');

      const btnListen = document.getElementById('btn-listen');
      const allToys = document.querySelectorAll('.toy-element');
      
      // Clear glows
      allToys.forEach(el => {
        el.classList.remove('glow-guide-active');
        el.classList.remove('guide-pulse-wrong');
      });

      if (modeName === 'learn') {
        btnListen.style.display = 'none';
        resetChallengeUI();
      } else {
        btnListen.style.display = 'flex';
        resetChallengeUI();
        initAudio(); // warm context
      }
    }

    function setSoundType(soundType) {
      selectedSound = soundType;
      document.getElementById('btn-sound-chime').classList.remove('active');
      document.getElementById('btn-sound-marimba').classList.remove('active');
      document.getElementById(`btn-sound-${soundType}`).classList.add('active');
      
      initAudio(); // warm context
    }

    function resetChallengeUI() {
      const btnListen = document.getElementById('btn-listen');
      btnListen.style.background = 'var(--color-gold)';
      btnListen.querySelector('i').className = 'fas fa-volume-up';
      btnListen.style.transform = 'translate(-50%, -50%) scale(1)';
      isWaitingForAnswer = false;
      currentTargetElement = null;
    }

    function playChallengeSound() {
      if (isWaitingForAnswer) {
        // Re-play sound and animation
        playElementSound(currentTargetElement);
        triggerElementAnimation(currentTargetElement);
        if (currentMode === 'learn') {
          triggerGuideGlow(currentTargetElement);
        }
        return;
      }
      
      resetChallengeUI();
      
      // Pick a random element from all toys
      const keys = Object.keys(toyDetails);
      currentTargetElement = keys[Math.floor(Math.random() * keys.length)];
      
      // Animate center button
      const btn = document.getElementById('btn-listen');
      btn.style.transform = 'translate(-50%, -50%) scale(1.1)';
      setTimeout(() => btn.style.transform = 'translate(-50%, -50%) scale(1)', 200);

      // Play Sound
      playElementSound(currentTargetElement);

      if (currentMode === 'learn') {
        // Nivel 1: play sound, trigger custom animation and show glowing guide
        triggerElementAnimation(currentTargetElement);
        triggerGuideGlow(currentTargetElement);
        isWaitingForAnswer = false;
      } else {
        // Nivel 2: guess by tapping correct element, nothing glows
        isWaitingForAnswer = true;
      }
    }

    // --- Particle Physics Effects Engine ---
    const canvas = document.getElementById('effects-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      const sandbox = document.getElementById('play-sandbox');
      canvas.width = sandbox.clientWidth;
      canvas.height = sandbox.clientHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 300);

    class Particle {
      constructor(x, y, color) {
        const rect = canvas.getBoundingClientRect();
        this.x = x - rect.left;
        this.y = y - rect.top;
        this.color = color;
        this.size = Math.random() * 12 + 6;
        this.speedX = Math.random() * 8 - 4;
        this.speedY = Math.random() * 8 - 4;
        this.gravity = 0.12;
        this.alpha = 1;
        this.decay = Math.random() * 0.02 + 0.015;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.speedY += this.gravity;
        this.alpha -= this.decay;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.restore();
      }
    }

    function spawnParticles(x, y, color) {
      for (let i = 0; i < 15; i++) {
        particles.push(new Particle(x, y, color));
      }
    }

    function spawnFloatingEmoji(x, y, emoji) {
      const el = document.createElement('div');
      el.className = 'glowing-emoji';
      el.innerText = emoji;
      
      const sandboxRect = document.getElementById('play-sandbox').getBoundingClientRect();
      el.style.left = `${x - sandboxRect.left}px`;
      el.style.top = `${y - sandboxRect.top}px`;
      
      document.getElementById('play-sandbox').appendChild(el);
      
      let speedY = Math.random() * -3 - 2;
      let speedX = Math.random() * 4 - 2;
      let opacity = 1;
      let scale = 1;
      let rot = 0;
      let rotSpeed = Math.random() * 10 - 5;
      
      function step() {
        speedY += 0.08;
        const curTop = parseFloat(el.style.top);
        const curLeft = parseFloat(el.style.left);
        
        el.style.top = `${curTop + speedY}px`;
        el.style.left = `${curLeft + speedX}px`;
        el.style.transform = `rotate(${rot}deg) scale(${scale})`;
        el.style.opacity = opacity;
        
        rot += rotSpeed;
        opacity -= 0.02;
        scale -= 0.01;
        
        if (opacity > 0) {
          requestAnimationFrame(step);
        } else {
          el.remove();
        }
      }
      requestAnimationFrame(step);
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        
        if (particles[i].alpha <= 0) {
          particles.splice(i, 1);
        }
      }
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
