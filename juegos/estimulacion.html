<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Microsoft Clarity Tracking Code -->
  <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "xfop6mj4wx");
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Seven Keys School | Cielo y Tierra</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background: #020617;
      height: 100vh;
      max-height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    header {
      padding: 0.8rem 1.5rem;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(8px);
      z-index: 20;
      position: relative;
      transition: all 0.3s ease;
    }

    .header-logo {
      height: 48px;
      width: auto;
    }

    .stimulation-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0.5rem 1rem 1rem 1rem;
      position: relative;
      height: calc(100vh - 80px);
    }

    /* Top Controls Panel */
    .controls-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 0.6rem 1.2rem;
      border-radius: 16px;
      z-index: 10;
      transition: all 0.3s ease;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .control-label {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .btn-toggle-group {
      display: flex;
      background: rgba(0, 0, 0, 0.25);
      padding: 3px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .btn-toggle {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 700;
      border-radius: 9px;
      cursor: pointer;
      transition: var(--transition-smooth);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-toggle.active {
      background: var(--color-gold);
      color: #020617;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.25);
    }

    .btn-toggle:hover:not(.active) {
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
    }

    /* Main Sandbox Play Area */
    .sandbox-area {
      flex: 1;
      width: 100%;
      background: #020617;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    #effects-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    /* Split Screen Layout (Cielo y Tierra) */
    .split-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      z-index: 1;
      position: relative;
    }

    .zone-half {
      flex: 1;
      width: 100%;
      position: relative;
      transition: background 0.3s ease;
      touch-action: none;
    }

    /* Cielo (High sound zone) */
    .zone-sky-half {
      background: linear-gradient(to bottom, #060b18 0%, #111d40 100%);
      border-bottom: 2px solid rgba(255, 255, 255, 0.05);
    }

    /* Tierra (Low sound zone) */
    .zone-ground-half {
      background: linear-gradient(to bottom, #2b1409 0%, #131110 100%);
    }

    /* Background graphics */
    .zone-graphics {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      opacity: 0.5;
    }

    /* Interactive Toy Elements */
    .toy-element {
      position: absolute;
      cursor: pointer;
      z-index: 3;
      touch-action: none;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    }

    .toy-element:hover {
      filter: brightness(1.2);
    }

    /* Clean coordinate distribution to prevent overlaps */
    .toy-sun { top: 8%; right: 6%; width: 85px; height: 85px; }
    .toy-cloud1 { top: 10%; left: 6%; width: 110px; height: 60px; }
    .toy-cloud2 { top: 24%; left: 20%; width: 95px; height: 50px; }
    .toy-bird { top: 10%; left: 46%; width: 60px; height: 60px; }
    .toy-butterfly { top: 22%; right: 26%; width: 55px; height: 55px; }
    
    .toy-star1 { top: 6%; left: 32%; width: 40px; height: 40px; }
    .toy-star2 { top: 22%; left: 56%; width: 40px; height: 40px; }
    .toy-star3 { top: 8%; right: 38%; width: 40px; height: 40px; }

    /* Ground elements coordinates */
    .toy-drum { bottom: 10%; left: 24%; width: 90px; height: 90px; }
    .toy-mushroom { bottom: 12%; left: 45%; width: 60px; height: 70px; }
    .toy-frog { bottom: 12%; right: 24%; width: 70px; height: 70px; }
    .toy-flower1 { bottom: 8%; left: 8%; width: 60px; height: 90px; }
    .toy-flower2 { bottom: 10%; right: 8%; width: 60px; height: 90px; }
    .toy-snail { bottom: 6%; left: 58%; width: 70px; height: 55px; }

    /* --- Custom Animations --- */
    .anim-pulse {
      animation: spinPulse 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes spinPulse {
      0% { transform: scale(1) rotate(0deg); filter: brightness(1); }
      50% { transform: scale(1.25) rotate(15deg); filter: brightness(1.4); }
      100% { transform: scale(1) rotate(0deg); filter: brightness(1); }
    }

    .anim-float {
      animation: cloudFloat 0.6s cubic-bezier(0.455, 0.03, 0.515, 0.955);
    }
    @keyframes cloudFloat {
      0% { transform: translateX(0) scale(1); }
      50% { transform: translateX(15px) scale(1.1); filter: brightness(1.2); }
      100% { transform: translateX(0) scale(1); }
    }

    .anim-hop {
      animation: birdHop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes birdHop {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-25px) scale(1.2) rotate(-5deg); }
      100% { transform: translateY(0) scale(1); }
    }

    .anim-flutter {
      animation: butterflyFlutter 0.6s ease-in-out;
    }
    @keyframes butterflyFlutter {
      0% { transform: scale(1) rotate(0deg); }
      30% { transform: scale(1.2) rotate(-15deg); }
      70% { transform: scale(1.2) rotate(15deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .anim-bounce {
      animation: drumBounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes drumBounce {
      0% { transform: scale(1); }
      30% { transform: scale(1.2, 0.8); } /* squash */
      60% { transform: scale(0.9, 1.2); } /* stretch */
      100% { transform: scale(1); }
    }

    .anim-sway {
      animation: flowerSway 0.6s ease-in-out;
    }
    @keyframes flowerSway {
      0% { transform: rotate(0deg); }
      33% { transform: rotate(-15deg) scale(1.1); }
      66% { transform: rotate(15deg) scale(1.1); }
      100% { transform: rotate(0deg); }
    }

    .anim-slide {
      animation: snailSlide 0.6s ease-in-out;
    }
    @keyframes snailSlide {
      0% { transform: translateX(0); }
      50% { transform: translateX(20px) scale(1.1); }
      100% { transform: translateX(0); }
    }

    /* Target indicator glow for Level 1 */
    .glow-guide-active {
      filter: drop-shadow(0 0 25px var(--glow-color)) brightness(1.3) !important;
      transform: scale(1.15);
    }

    /* Wrong choice pulse */
    .guide-pulse-wrong {
      animation: wrongPulse 0.4s 3 ease-in-out;
    }
    @keyframes wrongPulse {
      0%, 100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.18); filter: drop-shadow(0 0 20px var(--glow-color)) brightness(1.3); }
    }

    /* Play/Listen button in the middle */
    .challenge-center-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--color-gold);
      color: #020617;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
      z-index: 10;
      cursor: pointer;
      border: 4px solid #ffffff;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .challenge-center-button:active {
      transform: translate(-50%, -50%) scale(1.15);
    }

    .challenge-center-button i {
      font-size: 2.2rem;
    }

    /* Star decoration background */
    .bg-glowing-star {
      position: absolute;
      color: rgba(255, 255, 255, 0.08);
      font-size: 0.7rem;
      pointer-events: none;
      animation: flashStar 3s infinite ease-in-out;
    }

    @keyframes flashStar {
      0%, 100% { opacity: 0.1; transform: scale(0.8); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    /* --- Teacher Juandi Mascot Widget --- */
    .teacher-mascot-container {
      position: absolute;
      bottom: 20px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 15;
      pointer-events: none;
    }

    .teacher-avatar-wrapper {
      width: 85px;
      height: 85px;
      border-radius: 50%;
      border: 3px solid var(--color-gold);
      overflow: hidden;
      background: #0f172a;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: auto;
      cursor: pointer;
    }

    .teacher-avatar-wrapper:active {
      transform: scale(1.1);
    }

    .teacher-avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: filter 0.2s ease;
    }

    .teacher-bubble {
      background: rgba(15, 23, 42, 0.95);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      padding: 0.6rem 1.2rem;
      border-radius: 18px;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 700;
      max-width: 250px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      position: relative;
      animation: bubblePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      transform-origin: left center;
    }

    .teacher-bubble::after {
      content: '';
      position: absolute;
      left: -8px;
      top: 50%;
      transform: translateY(-50%);
      border-width: 8px 8px 8px 0;
      border-style: solid;
      border-color: transparent rgba(15, 23, 42, 0.95) transparent transparent;
    }

    @keyframes bubblePop {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Screen Rotation Hint Overlay */
    .rotation-hint-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #020617;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      text-align: center;
      padding: 2rem;
      display: none;
    }

    .rotation-hint-icon {
      font-size: 4rem;
      color: var(--color-gold);
      animation: rotatePhone 2s infinite ease-in-out;
      margin-bottom: 1.5rem;
    }

    @keyframes rotatePhone {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(-90deg); }
      100% { transform: rotate(0deg); }
    }

    .rotation-hint-title {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }

    .rotation-hint-text {
      font-size: 1rem;
      color: var(--text-muted);
    }

    /* Loading notice */
    .loading-notice {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1.5rem 2.5rem;
      border-radius: 20px;
      text-align: center;
      z-index: 100;
      pointer-events: none;
      display: none;
    }

    /* Confetti Particle canvas structure */
    .confetti-active {
      pointer-events: none;
    }

    /* --- RESPONSIVE LANDSCAPE MODE AUTO-FULLSCREEN --- */
    @media (orientation: landscape) and (max-height: 550px) {
      header {
        display: none !important; /* Hide header completely in landscape to maximize height */
      }
      .controls-panel {
        padding: 0.3rem 1rem;
        margin-bottom: 0.3rem;
        border-radius: 8px;
      }
      .stimulation-container {
        padding: 0.2rem;
        height: 100vh;
      }
      .sandbox-area {
        border-radius: 12px;
      }
      .toy-element {
        transform: scale(0.6); /* Scale down items to fit short landscape height */
      }
      .toy-element:hover {
        transform: scale(0.6);
      }
      .teacher-mascot-container {
        bottom: 8px;
        left: 8px;
        transform: scale(0.75);
        transform-origin: bottom left;
      }
      .challenge-center-button {
        width: 60px;
        height: 60px;
      }
      .challenge-center-button i {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <!-- Rotation recommendation for phone -->
  <div class="rotation-hint-overlay" id="rotation-overlay">
    <i class="fas fa-mobile-alt rotation-hint-icon"></i>
    <div class="rotation-hint-title">¡Gira tu celular!</div>
    <div class="rotation-hint-text">Juega a pantalla completa para una mejor experiencia táctil.</div>
  </div>

  <header id="main-header">
    <div class="logo-container">
      <img src="../img/logo.png" alt="Seven Keys School" class="header-logo">
    </div>
    <a href="index.html" class="btn-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Volver a Juegos
    </a>
  </header>

  <main class="stimulation-container">
    <!-- Game Mode Controls -->
    <div class="controls-panel" id="main-controls">
      <div class="control-group">
        <span class="control-label">Nivel:</span>
        <div class="btn-toggle-group">
          <button class="btn-toggle active" id="btn-mode-learn" onclick="setMode('learn')">
            <i class="fas fa-eye"></i> Nivel 1: Descubrir
          </button>
          <button class="btn-toggle" id="btn-mode-challenge" onclick="setMode('challenge')">
            <i class="fas fa-question-circle"></i> Nivel 2: El Reto
          </button>
        </div>
      </div>

      <div class="control-group">
        <span class="control-label">Sonido:</span>
        <div class="btn-toggle-group">
          <button class="btn-toggle active" id="btn-sound-chime" onclick="setSoundType('chime')">
            ✨ Campanas
          </button>
          <button class="btn-toggle" id="btn-sound-marimba" onclick="setSoundType('marimba')">
            🪵 Xilófono
          </button>
        </div>
      </div>
    </div>

    <!-- Sandbox Play Area -->
    <div class="sandbox-area" id="play-sandbox">
      <canvas id="effects-canvas"></canvas>

      <!-- Teacher Juandi Mascot Widget -->
      <div class="teacher-mascot-container">
        <div class="teacher-avatar-wrapper" onclick="triggerTeacherJuandiVoice()">
          <img src="../img/profe.jpg" alt="Profe Juandi" class="teacher-avatar-img" id="teacher-avatar">
        </div>
        <div class="teacher-bubble" id="teacher-speech-bubble">
          ¡Hola! Soy el Profe Juandi. ¡Toca los elementos del Cielo y la Tierra para descubrir sus sonidos!
        </div>
      </div>

      <!-- Loading notice -->
      <div class="loading-notice" id="loading-notice">
        <p>Cargando sonidos reales...</p>
        <div class="spinner"></div>
      </div>

      <!-- Play Button for Challenge / Listening -->
      <button class="challenge-center-button" id="btn-listen" onclick="playChallengeSound()" aria-label="Escuchar Sonido">
        <i class="fas fa-volume-up"></i>
      </button>

      <!-- Split Screen Layout -->
      <div class="split-container">
        <!-- Sky (High Note Zone) -->
        <div class="zone-half zone-sky-half" id="zone-sky">
          <div class="zone-graphics">
            <span class="bg-glowing-star" style="top: 15%; left: 18%;">⭐</span>
            <span class="bg-glowing-star" style="top: 30%; left: 40%;">⭐</span>
            <span class="bg-glowing-star" style="top: 22%; left: 88%;">⭐</span>
          </div>

          <!-- Sun Vector -->
          <div class="toy-element toy-sun" id="toy-sun" style="--glow-color: rgba(251, 191, 36, 0.8);" onmousedown="onElementTap('sun', event)" ontouchstart="onElementTap('sun', event)">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
              <circle cx="50" cy="50" r="24" fill="#fbbf24" filter="drop-shadow(0 0 12px #f59e0b)" />
              <path d="M50 8 L50 20 M50 80 L50 92 M8 50 L20 50 M80 50 L92 50 M20 20 L29 29 M71 71 L80 80 M20 80 L29 71 M71 29 L80 20" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" />
            </svg>
          </div>

          <!-- Clouds Vectors -->
          <div class="toy-element toy-cloud1" id="toy-cloud1" style="--glow-color: rgba(56, 189, 248, 0.6);" onmousedown="onElementTap('cloud1', event)" ontouchstart="onElementTap('cloud1', event)">
            <svg viewBox="0 0 100 60" width="100%" height="100%">
              <path d="M10 45 A 20 20 0 0 1 35 25 A 25 25 0 0 1 75 25 A 18 18 0 0 1 90 45 Z" fill="#e2e8f0" opacity="0.9" />
            </svg>
          </div>
          <div class="toy-element toy-cloud2" id="toy-cloud2" style="--glow-color: rgba(56, 189, 248, 0.5);" onmousedown="onElementTap('cloud2', event)" ontouchstart="onElementTap('cloud2', event)">
            <svg viewBox="0 0 100 60" width="100%" height="100%">
              <path d="M10 45 A 16 16 0 0 1 30 28 A 20 20 0 0 1 70 28 A 15 15 0 0 1 90 45 Z" fill="#e2e8f0" opacity="0.8" />
            </svg>
          </div>

          <!-- Flying Bird -->
          <div class="toy-element toy-bird" id="toy-bird" style="--glow-color: rgba(96, 165, 250, 0.7);" onmousedown="onElementTap('bird', event)" ontouchstart="onElementTap('bird', event)">
            <svg viewBox="0 0 60 60" width="100%" height="100%">
              <circle cx="30" cy="30" r="18" fill="#3b82f6" />
              <circle cx="42" cy="22" r="7" fill="#60a5fa" />
              <polygon points="48,20 56,24 48,28" fill="#f59e0b" />
              <circle cx="42" cy="20" r="1.8" fill="#000" />
              <path d="M12 28 Q 6 34 12 40 Z" fill="#1d4ed8" />
            </svg>
          </div>

          <!-- Flying Butterfly -->
          <div class="toy-element toy-butterfly" id="toy-butterfly" style="--glow-color: rgba(232, 121, 249, 0.7);" onmousedown="onElementTap('butterfly', event)" ontouchstart="onElementTap('butterfly', event)">
            <svg viewBox="0 0 60 60" width="100%" height="100%">
              <ellipse cx="20" cy="25" rx="12" ry="16" fill="#e879f9" />
              <ellipse cx="22" cy="38" rx="8" ry="10" fill="#f472b6" />
              <ellipse cx="40" cy="25" rx="12" ry="16" fill="#e879f9" />
              <ellipse cx="38" cy="38" rx="8" ry="10" fill="#f472b6" />
              <rect x="28" y="15" width="4" height="30" rx="2" fill="#475569" />
            </svg>
          </div>

          <!-- Star Elements -->
          <div class="toy-element toy-star1" id="toy-star1" style="--glow-color: rgba(251, 191, 36, 0.8);" onmousedown="onElementTap('star1', event)" ontouchstart="onElementTap('star1', event)">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
              <path d="M50 5 L63 36 L96 38 L71 60 L78 93 L50 75 L22 93 L29 60 L4 38 L37 36 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="3" stroke-linejoin="round" />
            </svg>
          </div>
          <div class="toy-element toy-star2" id="toy-star2" style="--glow-color: rgba(251, 191, 36, 0.8);" onmousedown="onElementTap('star2', event)" ontouchstart="onElementTap('star2', event)">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
              <path d="M50 5 L63 36 L96 38 L71 60 L78 93 L50 75 L22 93 L29 60 L4 38 L37 36 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="3" stroke-linejoin="round" />
            </svg>
          </div>
          <div class="toy-element toy-star3" id="toy-star3" style="--glow-color: rgba(251, 191, 36, 0.8);" onmousedown="onElementTap('star3', event)" ontouchstart="onElementTap('star3', event)">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
              <path d="M50 5 L63 36 L96 38 L71 60 L78 93 L50 75 L22 93 L29 60 L4 38 L37 36 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="3" stroke-linejoin="round" />
            </svg>
          </div>
        </div>

        <!-- Ground (Low Note Zone) -->
        <div class="zone-half zone-ground-half" id="zone-ground">
          <div class="zone-graphics">
            <span class="bg-glowing-star" style="bottom: 12%; left: 16%;">⭐</span>
            <span class="bg-glowing-star" style="bottom: 28%; left: 50%;">⭐</span>
            <span class="bg-glowing-star" style="bottom: 18%; left: 84%;">⭐</span>
          </div>

          <!-- Drum Vector -->

    const elementEmojis = {

    // Teacher Juandi messages database
    const teacherMessages = {

    function updateTeacherBubble(message, status = 'normal') {
      const bubble = document.getElementById('teacher-speech-bubble');
      const avatar = document.getElementById('teacher-avatar');
      
      bubble.innerText = message;
      
      // Update teacher state image
      if (status === 'success') {
        avatar.src = '../img/profe_celebrate.jpg';
        avatar.parentElement.style.transform = 'scale(1.15) rotate(5deg)';
      } else if (status === 'fail') {
        avatar.src = '../img/profe_sad.jpg';
        avatar.parentElement.style.transform = 'scale(0.95)';
      } else {
        avatar.src = '../img/profe.jpg';
        avatar.parentElement.style.transform = 'scale(1)';
      }
    }

    function resetTeacherAvatar() {
      const avatar = document.getElementById('teacher-avatar');
      avatar.src = '../img/profe.jpg';
      avatar.parentElement.style.transform = 'scale(1)';
    }

    function triggerTeacherJuandiVoice() {
      // Tap on teacher repeats instructions
      initAudio();
      if (currentMode === 'learn') {
        updateTeacherBubble(teacherMessages.welcome_learn);
      } else {
        updateTeacherBubble(teacherMessages.welcome_challenge);
      }
      setTimeout(resetTeacherAvatar, 2000);
    }

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      triggerSoundsLoading();
    }

    async function triggerSoundsLoading() {
      if (isLoadingSounds || soundsLoaded) return;
      isLoadingSounds = true;
      const notice = document.getElementById('loading-notice');
      notice.style.display = 'block';

      try {
        const response1 = await fetch(noteFiles[0]);
        const arrayBuffer1 = await response1.arrayBuffer();
        audioBuffers[1] = await audioCtx.decodeAudioData(arrayBuffer1);

        const response2 = await fetch(noteFiles[1]);
        const arrayBuffer2 = await response2.arrayBuffer();
        audioBuffers[7] = await audioCtx.decodeAudioData(arrayBuffer2);
        
        soundsLoaded = true;
      } catch (e) {
        console.error("Error loading note files:", e);
      }

      isLoadingSounds = false;
      notice.style.display = 'none';
    }

    // Play specific element sound
    function playElementSound(toyKey) {
      initAudio();
      const details = toyDetails[toyKey];
      if (!details) return;

      if (toyKey === 'bird') {
        const now = audioCtx.currentTime;
        playSingleFrequency(details.synthFreq, now, 0.08);
        playSingleFrequency(details.synthFreq * 1.15, now + 0.09, 0.12);
        return;
      }
      if (toyKey === 'frog') {
        const now = audioCtx.currentTime;
        function makeRibbit(time) {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          const mod = audioCtx.createOscillator();
          const modGain = audioCtx.createGain();
          
          mod.type = 'sine';
          mod.frequency.setValueAtTime(25, time); 
          modGain.gain.setValueAtTime(15, time); 
          
          osc.type = 'triangle'; 
          osc.frequency.setValueAtTime(140, time);
          osc.frequency.exponentialRampToValueAtTime(195, time + 0.07);
          osc.frequency.exponentialRampToValueAtTime(150, time + 0.14);
          
          mod.connect(modGain);
          modGain.connect(osc.frequency);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          
          gain.gain.setValueAtTime(0.001, time);
          gain.gain.linearRampToValueAtTime(0.3, time + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, time + 0.14);
          
          osc.start(time);
          mod.start(time);
          osc.stop(time + 0.16);
          mod.stop(time + 0.16);
        }
        makeRibbit(now);
        makeRibbit(now + 0.2);
        return;
      }
      if (toyKey === 'snail') {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(details.synthFreq, now);
        osc.frequency.linearRampToValueAtTime(details.synthFreq * 1.4, now + 0.4);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now);
        osc.stop(now + 0.42);
        return;
      }

      if (soundsLoaded && audioBuffers[details.noteIndex] && selectedSound === 'marimba') {
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffers[details.noteIndex];
        source.playbackRate.setValueAtTime(details.pitchRate, audioCtx.currentTime);
        source.connect(audioCtx.destination);
        source.start(0);
      } else {
        playSynthChime(details.synthFreq);
      }
    }

    function playSingleFrequency(freq, time, duration) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, time);
      gain.gain.setValueAtTime(0.25, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + duration - 0.01);
      osc.start(time);
      osc.stop(time + duration);
    }

    function playSynthChime(freq) {
      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      const gainNode2 = audioCtx.createGain();
      
      osc1.connect(gainNode);
      osc2.connect(gainNode2);
      gainNode.connect(audioCtx.destination);
      gainNode2.connect(audioCtx.destination);
      
      const now = audioCtx.currentTime;
      
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(freq, now);
      
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(freq * 2.01, now);
      
      gainNode.gain.setValueAtTime(0.4, now);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.6);
      
      gainNode2.gain.setValueAtTime(0.1, now);
      gainNode2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      
      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + 1.7);
      osc2.stop(now + 0.6);
    }

    function playSuccessChime() {
      const now = audioCtx.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.50];
      notes.forEach((freq, idx) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now + (idx * 0.08));
        
        gain.gain.setValueAtTime(0.3, now + (idx * 0.08));
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8 + (idx * 0.08));
        
        osc.start(now + (idx * 0.08));
        osc.stop(now + 0.9 + (idx * 0.08));
      });
    }

    function playFailChime() {
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(220.00, now);
      osc.frequency.linearRampToValueAtTime(180.00, now + 0.25);
      
      gain.gain.setValueAtTime(0.4, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      
      osc.start(now);
      osc.stop(now + 0.4);
    }

    // --- Interaction routing ---
    function onElementTap(toyKey, event) {
      event.preventDefault();
      
      let clientX, clientY;
      if (event.touches && event.touches[0]) {
        clientX = event.touches[0].clientX;
        clientY = event.touches[0].clientY;
      } else {
        clientX = event.clientX;
        clientY = event.clientY;
      }

      const details = toyDetails[toyKey];
      if (!details) return;

      triggerElementAnimation(toyKey);

      if (currentMode === 'learn') {
        playElementSound(toyKey);
        triggerGuideGlow(toyKey);
        
        spawnParticles(clientX, clientY, details.color);
        spawnFloatingEmoji(clientX, clientY, details.emoji);
      } else {
        if (!isWaitingForAnswer) return;
        isWaitingForAnswer = false;

        const btnListen = document.getElementById('btn-listen');

        if (toyKey === currentTargetElement) {
          // Success!
          playSuccessChime();
          
          btnListen.style.background = '#10b981';
          btnListen.querySelector('i').className = 'fas fa-check';
          
          // Confetti!
          spawnConfettiExplosion(clientX, clientY);
          
          // Teacher celebrates!
          const rMsg = teacherMessages.success[Math.floor(Math.random() * teacherMessages.success.length)];
          updateTeacherBubble(rMsg, 'success');

          spawnParticles(clientX, clientY, '#10b981');
          for (let i = 0; i < 6; i++) {
            setTimeout(() => {
              spawnFloatingEmoji(clientX + (Math.random() * 80 - 40), clientY + (Math.random() * 80 - 40), details.emoji);
            }, i * 50);
          }

          // Next round automatic
          setTimeout(() => {
            resetChallengeUI();
            playChallengeSound();
          }, 2400);
        } else {
          // Failure
          playFailChime();
          
          btnListen.style.background = '#ef4444';
          btnListen.querySelector('i').className = 'fas fa-volume-up';

          // Teacher gets sad / guides
          const rMsg = teacherMessages.fail[Math.floor(Math.random() * teacherMessages.fail.length)];
          updateTeacherBubble(rMsg, 'fail');

          // Pulse the correct toy element
          const correctEl = document.getElementById(`toy-${currentTargetElement}`);
          correctEl.classList.add('guide-pulse-wrong');
          setTimeout(() => correctEl.classList.remove('guide-pulse-wrong'), 1600);

          // Retry
          setTimeout(() => {
            btnListen.style.background = 'var(--color-gold)';
            isWaitingForAnswer = true;
          }, 1500);
        }
      }
    }

    function triggerElementAnimation(toyKey) {
      const details = toyDetails[toyKey];
      const el = document.getElementById(`toy-${toyKey}`);
      el.classList.add(details.animClass);
      setTimeout(() => el.classList.remove(details.animClass), 600);
    }

      const el = document.getElementById(`toy-${toyKey}`);
      el.classList.add('glow-guide-active');

    function setMode(modeName) {
      currentMode = modeName;
      document.getElementById('btn-mode-learn').classList.remove('active');
      document.getElementById('btn-mode-challenge').classList.remove('active');
      document.getElementById(`btn-mode-${modeName}`).classList.add('active');

      const btnListen = document.getElementById('btn-listen');
      const allToys = document.querySelectorAll('.toy-element');
      
      allToys.forEach(el => {
        el.classList.remove('glow-guide-active');
        el.classList.remove('guide-pulse-wrong');
      });

      if (modeName === 'learn') {
        btnListen.style.display = 'none';
        resetChallengeUI();
        updateTeacherBubble(teacherMessages.welcome_learn);
      } else {
        btnListen.style.display = 'flex';
        resetChallengeUI();
        initAudio(); // warm
        updateTeacherBubble(teacherMessages.welcome_challenge);
      }

      document.getElementById('btn-sound-chime').classList.remove('active');

    function resetChallengeUI() {
      const btnListen = document.getElementById('btn-listen');
      btnListen.style.background = 'var(--color-gold)';
      btnListen.querySelector('i').className = 'fas fa-volume-up';
      btnListen.style.transform = 'translate(-50%, -50%) scale(1)';
      isWaitingForAnswer = false;
      currentTargetElement = null;
      resetTeacherAvatar();
    }

    function playChallengeSound() {
      if (isWaitingForAnswer) {
        playElementSound(currentTargetElement);
        triggerElementAnimation(currentTargetElement);
        if (currentMode === 'learn') {
          triggerGuideGlow(currentTargetElement);
        }
        return;
      }
      
      resetChallengeUI();
      
      const keys = Object.keys(toyDetails);
      currentTargetElement = keys[Math.floor(Math.random() * keys.length)];
      
      const btn = document.getElementById('btn-listen');
      btn.style.transform = 'translate(-50%, -50%) scale(1.1)';
      setTimeout(() => btn.style.transform = 'translate(-50%, -50%) scale(1)', 200);

      playElementSound(currentTargetElement);

      if (currentMode === 'learn') {
        triggerElementAnimation(currentTargetElement);
        triggerGuideGlow(currentTargetElement);
        isWaitingForAnswer = false;
      } else {
        isWaitingForAnswer = true;
      }
    }

    // --- Particle Physics Effects & Confetti Engine ---
    const canvas = document.getElementById('effects-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let confettis = [];

    function resizeCanvas() {
      const sandbox = document.getElementById('play-sandbox');
      canvas.width = sandbox.clientWidth;
      canvas.height = sandbox.clientHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 300);

    class Particle {
      constructor(x, y, color) {
        const rect = canvas.getBoundingClientRect();
        this.x = x - rect.left;
        this.y = y - rect.top;
        this.color = color;
        this.size = Math.random() * 12 + 6;
        this.speedX = Math.random() * 8 - 4;
        this.speedY = Math.random() * 8 - 4;
        this.gravity = 0.12;
        this.alpha = 1;
        this.decay = Math.random() * 0.02 + 0.015;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.speedY += this.gravity;
        this.alpha -= this.decay;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.restore();
      }
    }

    class Confetti {
      constructor(x, y) {
        const rect = canvas.getBoundingClientRect();
        this.x = x - rect.left;
        this.y = y - rect.top;
        this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
        this.size = Math.random() * 8 + 6;
        this.speedX = Math.random() * 12 - 6;
        this.speedY = Math.random() * -12 - 5; // shoot upward
        this.gravity = 0.22;
        this.alpha = 1;
        this.rotation = Math.random() * 360;
        this.rotSpeed = Math.random() * 15 - 7.5;
        this.decay = Math.random() * 0.01 + 0.008;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.speedY += this.gravity;
        this.rotation += this.rotSpeed;
        this.alpha -= this.decay;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.translate(this.x, this.y);
        ctx.rotate((this.rotation * Math.PI) / 180);
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
        ctx.restore();
      }
    }

    function spawnParticles(x, y, color) {
      for (let i = 0; i < 15; i++) {
        particles.push(new Particle(x, y, color));
      }
    }

    function spawnConfettiExplosion(x, y) {
      for (let i = 0; i < 60; i++) {
        confettis.push(new Confetti(x, y));
      }
    }

    function spawnFloatingEmoji(x, y, emoji) {
      const el = document.createElement('div');
      el.className = 'glowing-emoji';
      el.innerText = emoji;
      
      const sandboxRect = document.getElementById('play-sandbox').getBoundingClientRect();
      el.style.left = `${x - sandboxRect.left}px`;
      el.style.top = `${y - sandboxRect.top}px`;
      
      document.getElementById('play-sandbox').appendChild(el);
      
      let speedY = Math.random() * -3 - 2;
      let speedX = Math.random() * 4 - 2;
      let opacity = 1;
      let scale = 1;
      let rot = 0;
      let rotSpeed = Math.random() * 10 - 5;
      
      function step() {
        speedY += 0.08;
        const curTop = parseFloat(el.style.top);
        const curLeft = parseFloat(el.style.left);
        
        el.style.top = `${curTop + speedY}px`;
        el.style.left = `${curLeft + speedX}px`;
        el.style.transform = `rotate(${rot}deg) scale(${scale})`;
        el.style.opacity = opacity;
        
        rot += rotSpeed;
        opacity -= 0.02;
        scale -= 0.01;
        
        if (opacity > 0) {
          requestAnimationFrame(step);
        } else {
          el.remove();
        }
      }
      requestAnimationFrame(step);
    }

    // --- Responsive Orientation Check ---
    function checkOrientation() {
      const isMobile = window.innerWidth <= 768;
      const isPortrait = window.innerHeight > window.innerWidth;
      const overlay = document.getElementById('rotation-overlay');

      if (isMobile && isPortrait) {
        overlay.style.display = 'flex';
      } else {
        overlay.style.display = 'none';
      }
    }

    window.addEventListener('resize', checkOrientation);
    window.addEventListener('load', checkOrientation);
    checkOrientation();

    // Canvas animation loop
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Particles loop
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].alpha <= 0) {
          particles.splice(i, 1);
        }
      }

      // Confetti loop
      for (let i = confettis.length - 1; i >= 0; i--) {
        confettis[i].update();
        confettis[i].draw();
        if (confettis[i].alpha <= 0) {
          confettis.splice(i, 1);
        }
      }
      
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
