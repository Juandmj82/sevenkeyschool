<html lang="es">
<head>
  <!-- Microsoft Clarity Tracking Code -->
  <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "xfop6mj4wx");

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Seven Keys School | Cielo y Tierra</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background: #020617;
      height: 100vh;
      max-height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    header {
      padding: 0.8rem 1.5rem;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(8px);
      z-index: 20;
      position: relative;
    }

    .header-logo {
      height: 48px;
      width: auto;
    }

    .stimulation-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0.5rem 1rem 1rem 1rem;
      position: relative;
    }

    /* Top Controls Panel */
    .controls-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 0.6rem 1.2rem;
      border-radius: 16px;
      z-index: 10;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .control-label {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .btn-toggle-group {
      display: flex;
      background: rgba(0, 0, 0, 0.25);
      padding: 3px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .btn-toggle {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 700;
      border-radius: 9px;
      cursor: pointer;
      transition: var(--transition-smooth);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-toggle.active {
      background: var(--color-gold);
      color: #020617;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.25);
    }

    .btn-toggle:hover:not(.active) {
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
    }

    /* Main Sandbox Play Area */
    .sandbox-area {
      flex: 1;
      width: 100%;
      background: #020617;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    #effects-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    /* Split Screen Layout (Cielo y Tierra) */
    .split-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      z-index: 1;
      position: relative;
    }

    .zone-half {
      flex: 1;
      width: 100%;
      position: relative;
      transition: background 0.3s ease;
      touch-action: none;
    }

    /* Cielo (High sound zone) */
    .zone-sky-half {
      background: linear-gradient(to bottom, #060b18 0%, #111d40 100%);
      border-bottom: 2px solid rgba(255, 255, 255, 0.05);
    }

    /* Tierra (Low sound zone) */
    .zone-ground-half {
      background: linear-gradient(to bottom, #2b1409 0%, #131110 100%);
    }

    /* Interactive Vector Elements */
    .toy-element {
      position: absolute;
      cursor: pointer;
      z-index: 3;
      transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s ease;
      touch-action: none;
    }

    .toy-element:hover {
      filter: brightness(1.2);
    }

    /* Specific element placements */
    .toy-sun { top: 10%; right: 8%; width: 90px; height: 90px; --glow-color: rgba(251, 191, 36, 0.8); }
    .toy-cloud1 { top: 12%; left: 10%; width: 120px; height: 65px; --glow-color: rgba(56, 189, 248, 0.6); }
    .toy-cloud2 { top: 26%; left: 35%; width: 100px; height: 55px; --glow-color: rgba(56, 189, 248, 0.5); }
    .toy-bird { top: 32%; left: 58%; width: 65px; height: 65px; --glow-color: rgba(96, 165, 250, 0.7); }
    .toy-butterfly { top: 22%; right: 35%; width: 55px; height: 55px; --glow-color: rgba(232, 121, 249, 0.7); }
    
    /* Stars */
    .toy-star1 { top: 8%; left: 32%; width: 45px; height: 45px; --glow-color: rgba(251, 191, 36, 0.8); }
    .toy-star2 { top: 16%; left: 50%; width: 40px; height: 40px; --glow-color: rgba(251, 191, 36, 0.8); }
    .toy-star3 { top: 24%; right: 24%; width: 45px; height: 45px; --glow-color: rgba(251, 191, 36, 0.8); }

    /* Ground elements */
    .toy-drum { bottom: 10%; left: 24%; width: 100px; height: 100px; --glow-color: rgba(251, 146, 60, 0.7); }
    .toy-mushroom { bottom: 12%; left: 45%; width: 65px; height: 75px; --glow-color: rgba(239, 68, 68, 0.7); }
    .toy-frog { bottom: 12%; right: 24%; width: 75px; height: 75px; --glow-color: rgba(34, 197, 94, 0.7); }
    .toy-flower1 { bottom: 8%; left: 8%; width: 65px; height: 100px; --glow-color: rgba(236, 72, 153, 0.7); }
    .toy-flower2 { bottom: 10%; right: 8%; width: 65px; height: 100px; --glow-color: rgba(6, 182, 212, 0.7); }
    .toy-snail { bottom: 6%; left: 58%; width: 75px; height: 60px; --glow-color: rgba(168, 85, 247, 0.7); }

    /* Pulse animation triggered on sound (Level 1) */
    .pulse-glow-active {
      animation: elementPulse 0.6s infinite ease-in-out;
    }

    /* Pulse animation for incorrect selection guidance */
    .guide-pulse-active {
      animation: elementPulse 0.4s 3 ease-in-out;
    }

    @keyframes elementPulse {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.1)) brightness(1);
      }
      50% {
        transform: scale(1.18);
        filter: drop-shadow(0 0 25px var(--glow-color)) brightness(1.35);
      }
    }

    /* Play/Listen button in the middle */
    .challenge-center-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--color-gold);
      color: #020617;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
      z-index: 10;
      cursor: pointer;
      border: 4px solid #ffffff;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .challenge-center-button:active {
      transform: translate(-50%, -50%) scale(1.15);
    }

    .challenge-center-button i {
      font-size: 2.2rem;
    }

    /* Background starry decor */
    .bg-glowing-star {
      position: absolute;
      color: rgba(255, 255, 255, 0.08);
      font-size: 0.7rem;
      pointer-events: none;
      animation: flashStar 3s infinite ease-in-out;
    }

    @keyframes flashStar {
      0%, 100% { opacity: 0.1; transform: scale(0.8); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    /* Loading notice */
    .loading-notice {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1.5rem 2.5rem;
      border-radius: 20px;
      text-align: center;
      z-index: 100;
      pointer-events: none;
      display: none;
    }

    .loading-notice p {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .loading-notice .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid var(--color-gold);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Floating visual effects */
    .glowing-emoji {
      position: absolute;
      pointer-events: none;
      font-size: 2.5rem;
      z-index: 4;
    }

    @media (max-width: 768px) {
      .stimulation-container {
        padding: 0.5rem;
      }
      .controls-panel {
        flex-direction: column;
        gap: 0.6rem;
        padding: 0.6rem;
      }
      .toy-element {
        transform: scale(0.75);
      }
      .toy-element:hover {
        transform: scale(0.75);
      }
      /* Individual mobile coordinates tweaks to prevent overlaps */
      .toy-sun { top: 5%; right: 4%; }
      .toy-cloud1 { top: 6%; left: 4%; }
      .toy-cloud2 { top: 20%; left: 24%; }
      .toy-drum { bottom: 6%; left: 16%; }
      .toy-frog { bottom: 6%; right: 16%; }
    }
  </style>
</head>

  <script>
    // --- Audio setup ---
    const noteFiles = [
      '../music/xylophone/note1.wav', // DO4 (C4)
      '../music/xylophone/note7.wav'  // SI4 (B4)
    ];

    let audioCtx = null;
    let selectedSound = 'chime';
    let currentMode = 'learn'; // 'learn' or 'challenge'

    const audioBuffers = {};
    let soundsLoaded = false;
    let isLoadingSounds = false;

    // Challenge / state variables
    let currentTarget = null; // 'sky' or 'ground'
    let isWaitingForAnswer = false;

    // Configuration of heights
    const heightDetails = {
      sky: {
        noteIndex: 7, // SI4 (High)
        pitchRate: 1.25,
        synthFreq: 880.00,
        color: '#fbbf24'
      },
      ground: {
        noteIndex: 1, // DO4 (Low)
        pitchRate: 0.5,
        synthFreq: 130.81,
        color: '#fb923c'
      }
    };

    // Emojis mapping for element feedback
    const elementEmojis = {
      sun: '☀️', cloud1: '☁️', cloud2: '☁️', bird: '🐦', butterfly: '🦋',
      star1: '⭐', star2: '⭐', star3: '⭐',
      drum: '🥁', mushroom: '🍄', frog: '🐸', flower1: '🌸', flower2: '🌷', snail: '🐌'
    };

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      triggerSoundsLoading();
    }

    async function triggerSoundsLoading() {
      if (isLoadingSounds || soundsLoaded) return;
      isLoadingSounds = true;
      const notice = document.getElementById('loading-notice');
      notice.style.display = 'block';

      try {
        const response1 = await fetch(noteFiles[0]);
        const arrayBuffer1 = await response1.arrayBuffer();
        audioBuffers[1] = await audioCtx.decodeAudioData(arrayBuffer1);

        const response2 = await fetch(noteFiles[1]);
        const arrayBuffer2 = await response2.arrayBuffer();
        audioBuffers[7] = await audioCtx.decodeAudioData(arrayBuffer2);
        
        soundsLoaded = true;
      } catch (e) {
        console.error("Error loading note files:", e);
      }

      isLoadingSounds = false;
      notice.style.display = 'none';
    }

    function playSound(heightKey) {
      initAudio();
      const details = heightDetails[heightKey];

      if (soundsLoaded && audioBuffers[details.noteIndex] && selectedSound === 'marimba') {
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffers[details.noteIndex];
        source.playbackRate.setValueAtTime(details.pitchRate, audioCtx.currentTime);
        source.connect(audioCtx.destination);
        source.start(0);
      } else {
        playSynthChime(details.synthFreq);
      }
    }

    function playSynthChime(freq) {
      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      const gainNode2 = audioCtx.createGain();
      
      osc1.connect(gainNode);
      osc2.connect(gainNode2);
      gainNode.connect(audioCtx.destination);
      gainNode2.connect(audioCtx.destination);
      
      const now = audioCtx.currentTime;
      
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(freq, now);
      
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(freq * 2.01, now);
      
      gainNode.gain.setValueAtTime(0.5, now);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
      
      gainNode2.gain.setValueAtTime(0.12, now);
      gainNode2.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
      
      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + 1.9);
      osc2.stop(now + 0.7);
    }

    function playSuccessChime() {
      const now = audioCtx.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.50];
      notes.forEach((freq, idx) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now + (idx * 0.08));
        
        gain.gain.setValueAtTime(0.3, now + (idx * 0.08));
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8 + (idx * 0.08));
        
        osc.start(now + (idx * 0.08));
        osc.stop(now + 0.9 + (idx * 0.08));
      });
    }

    // Fail chime
    function playFailChime() {
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(220.00, now);
      osc.frequency.linearRampToValueAtTime(180.00, now + 0.25);
      
      gain.gain.setValueAtTime(0.4, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      
      osc.start(now);
      osc.stop(now + 0.4);
    }

    // --- Interaction Routing ---
    function onElementTap(height, elementName, event) {
      event.preventDefault();
      
      let clientX, clientY;
      if (event.touches && event.touches[0]) {
        clientX = event.touches[0].clientX;
        clientY = event.touches[0].clientY;
      } else {
        clientX = event.clientX;
        clientY = event.clientY;
      }

      const targetEl = event.currentTarget;
      
      // Tap Animation bounce
      targetEl.style.transform = 'scale(1.22) rotate(8deg)';
      setTimeout(() => targetEl.style.transform = 'scale(1) rotate(0deg)', 250);

      const heightColor = heightDetails[height].color;

      if (currentMode === 'learn') {
        // Nivel 1: plays sound, glows/pulses ALL elements of that height, spawns particles
        playSound(height);
        triggerVisualPulse(height);
        
        spawnParticles(clientX, clientY, heightColor);
        spawnFloatingEmoji(clientX, clientY, elementEmojis[elementName]);
      } else {
        // Nivel 2: Guessing mode active
        if (!isWaitingForAnswer) return;
        isWaitingForAnswer = false;

        const btnListen = document.getElementById('btn-listen');

        if (height === currentTarget) {
          // Success!
          playSuccessChime();
          
          btnListen.style.background = '#10b981'; // Green
          btnListen.querySelector('i').className = 'fas fa-check';
          
          spawnParticles(clientX, clientY, '#10b981');
          for (let i = 0; i < 6; i++) {
            setTimeout(() => {
              spawnFloatingEmoji(clientX + (Math.random() * 80 - 40), clientY + (Math.random() * 80 - 40), elementEmojis[elementName]);
            }, i * 50);
          }

          // Next round automatically
          setTimeout(() => {
            resetChallengeUI();
            playChallengeSound();
          }, 1800);
        } else {
          // Wrong choice - play low warning and guide them by pulsing the correct zone elements
          playFailChime();
          
          btnListen.style.background = '#ef4444'; // Red
          btnListen.querySelector('i').className = 'fas fa-volume-up';

          // Guide them by pulsing ALL correct height elements
          triggerCorrectHeightGuide(currentTarget);

          // Allow retry
          setTimeout(() => {
            btnListen.style.background = 'var(--color-gold)';
            isWaitingForAnswer = true;
          }, 1200);
        }
      }
    }

    // Nivel 1 helper: pulses all elements in the corresponding height
    function triggerVisualPulse(height) {
      const className = height === 'sky' ? 'toy-sky' : 'toy-ground';
      const elements = document.querySelectorAll(height === 'sky' ? '.zone-sky-half .toy-element' : '.zone-ground-half .toy-element');
      
      elements.forEach(el => {
        el.classList.add('pulse-glow-active');
        setTimeout(() => el.classList.remove('pulse-glow-active'), 800);
      });
    }

    // Guide helper: pulses all correct elements to show the right answer
    function triggerCorrectHeightGuide(height) {
      const elements = document.querySelectorAll(height === 'sky' ? '.zone-sky-half .toy-element' : '.zone-ground-half .toy-element');
      elements.forEach(el => {
        el.classList.add('guide-pulse-active');
        setTimeout(() => el.classList.remove('guide-pulse-active'), 1500);
      });
    }

    // --- Mode Setup ---
    function setMode(modeName) {
      currentMode = modeName;
      document.getElementById('btn-mode-learn').classList.remove('active');
      document.getElementById('btn-mode-challenge').classList.remove('active');
      document.getElementById(`btn-mode-${modeName}`).classList.add('active');

      const btnListen = document.getElementById('btn-listen');
      const allToys = document.querySelectorAll('.toy-element');
      
      // Clear pulses
      allToys.forEach(el => {
        el.classList.remove('pulse-glow-active');
        el.classList.remove('guide-pulse-active');
      });

      if (modeName === 'learn') {
        btnListen.style.display = 'none';
        resetChallengeUI();
      } else {
        btnListen.style.display = 'flex';
        resetChallengeUI();
        initAudio(); // warm context
      }
    }

    function setSoundType(soundType) {
      selectedSound = soundType;
      document.getElementById('btn-sound-chime').classList.remove('active');
      document.getElementById('btn-sound-marimba').classList.remove('active');
      document.getElementById(`btn-sound-${soundType}`).classList.add('active');
      
      initAudio(); // warm context
    }

    function resetChallengeUI() {
      const btnListen = document.getElementById('btn-listen');
      btnListen.style.background = 'var(--color-gold)';
      btnListen.querySelector('i').className = 'fas fa-volume-up';
      btnListen.style.transform = 'translate(-50%, -50%) scale(1)';
      isWaitingForAnswer = false;
      currentTarget = null;
    }

    function playChallengeSound() {
      if (isWaitingForAnswer) {
        // Re-play sound
        playSound(currentTarget);
        
        // In Nivel 1, also pulse visually
        if (currentMode === 'learn') {
          triggerVisualPulse(currentTarget);
        }
        return;
      }
      
      resetChallengeUI();
      currentTarget = Math.random() > 0.5 ? 'sky' : 'ground';
      
      // Animate center button
      const btn = document.getElementById('btn-listen');
      btn.style.transform = 'translate(-50%, -50%) scale(1.1)';
      setTimeout(() => btn.style.transform = 'translate(-50%, -50%) scale(1)', 200);

      // Play Sound
      playSound(currentTarget);

      if (currentMode === 'learn') {
        // Nivel 1: plays sound AND pulses/glows the corresponding height group
        triggerVisualPulse(currentTarget);
        isWaitingForAnswer = false;
      } else {
        // Nivel 2: Plays sound but nothing glows. Guessing mode active!
        isWaitingForAnswer = true;
      }
    }

    // --- Particle Physics Effects Engine ---
    const canvas = document.getElementById('effects-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      const sandbox = document.getElementById('play-sandbox');
      canvas.width = sandbox.clientWidth;
      canvas.height = sandbox.clientHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 300);

    class Particle {
      constructor(x, y, color) {
        const rect = canvas.getBoundingClientRect();
        this.x = x - rect.left;
        this.y = y - rect.top;
        this.color = color;
        this.size = Math.random() * 12 + 6;
        this.speedX = Math.random() * 8 - 4;
        this.speedY = Math.random() * 8 - 4;
        this.gravity = 0.12;
        this.alpha = 1;
        this.decay = Math.random() * 0.02 + 0.015;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.speedY += this.gravity;
        this.alpha -= this.decay;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.restore();
      }
    }

    function spawnParticles(x, y, color) {
      for (let i = 0; i < 15; i++) {
        particles.push(new Particle(x, y, color));
      }
    }

    function spawnFloatingEmoji(x, y, emoji) {
      const el = document.createElement('div');
      el.className = 'glowing-emoji';
      el.innerText = emoji;
      
      const sandboxRect = document.getElementById('play-sandbox').getBoundingClientRect();
      el.style.left = `${x - sandboxRect.left}px`;
      el.style.top = `${y - sandboxRect.top}px`;
      
      document.getElementById('play-sandbox').appendChild(el);
      
      let speedY = Math.random() * -3 - 2;
      let speedX = Math.random() * 4 - 2;
      let opacity = 1;
      let scale = 1;
      let rot = 0;
      let rotSpeed = Math.random() * 10 - 5;
      
      function step() {
        speedY += 0.08;
        const curTop = parseFloat(el.style.top);
        const curLeft = parseFloat(el.style.left);
        
        el.style.top = `${curTop + speedY}px`;
        el.style.left = `${curLeft + speedX}px`;
        el.style.transform = `rotate(${rot}deg) scale(${scale})`;
        el.style.opacity = opacity;
        
        rot += rotSpeed;
        opacity -= 0.02;
        scale -= 0.01;
        
        if (opacity > 0) {
          requestAnimationFrame(step);
        } else {
          el.remove();
        }
      }
      requestAnimationFrame(step);
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        
        if (particles[i].alpha <= 0) {
          particles.splice(i, 1);
        }
      }
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
