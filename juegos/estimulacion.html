<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Microsoft Clarity Tracking Code -->
  <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "xfop6mj4wx");
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Seven Keys School | Cielo y Tierra</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background: #020617;
      height: 100vh;
      max-height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    header {
      padding: 0.8rem 1.5rem;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(8px);
      z-index: 20;
      position: relative;
    }

    .header-logo {
      height: 48px;
      width: auto;
    }

    .stimulation-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0.5rem 1rem 1rem 1rem;
      position: relative;
    }

    /* Top Controls Panel */
    .controls-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 0.6rem 1.2rem;
      border-radius: 16px;
      z-index: 10;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .control-label {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .btn-toggle-group {
      display: flex;
      background: rgba(0, 0, 0, 0.25);
      padding: 3px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .btn-toggle {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 700;
      border-radius: 9px;
      cursor: pointer;
      transition: var(--transition-smooth);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-toggle.active {
      background: var(--color-gold);
      color: #020617;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.25);
    }

    .btn-toggle:hover:not(.active) {
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
    }

    /* Main Sandbox Play Area */
    .sandbox-area {
      flex: 1;
      width: 100%;
      background: #020617;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    #effects-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    /* Split Screen Layout (Cielo y Tierra) */
    .split-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      z-index: 1;
      position: relative;
    }

    .zone-half {
      flex: 1;
      width: 100%;
      position: relative;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter 0.25s ease, background 0.3s ease;
      touch-action: none;
    }

    /* Cielo (High sound zone) */
    .zone-sky-half {
      background: linear-gradient(to bottom, #0f172a 0%, #1e293b 100%);
      border-bottom: 2px solid rgba(255, 255, 255, 0.05);
    }

    /* Tierra (Low sound zone) */
    .zone-ground-half {
      background: linear-gradient(to bottom, #3f200f 0%, #1c1917 100%);
    }

    .zone-half:hover {
      filter: brightness(1.05);
    }

    /* High quality vector vector illustrations inside zones */
    .zone-graphics {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* Core Visual Cards in Center of halves */
    .zone-label-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      background: rgba(0, 0, 0, 0.5);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      padding: 1.2rem 2.2rem;
      border-radius: 28px;
      pointer-events: none;
      box-shadow: 0 12px 35px rgba(0,0,0,0.4);
      z-index: 3;
      backdrop-filter: blur(6px);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .zone-sky-half:active .zone-label-card,
    .zone-sky-half.active-touch .zone-label-card {
      transform: scale(1.1);
      border-color: #38bdf8;
    }

    .zone-ground-half:active .zone-label-card,
    .zone-ground-half.active-touch .zone-label-card {
      transform: scale(1.1);
      border-color: #fb923c;
    }

    .zone-half-title {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .zone-sky-half .zone-half-title {
      color: #38bdf8;
      text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
    }

    .zone-ground-half .zone-half-title {
      color: #fb923c;
      text-shadow: 0 0 10px rgba(251, 146, 60, 0.3);
    }

    .zone-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    /* Play button overlay for challenge mode */
    .challenge-center-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: var(--color-gold);
      color: #020617;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
      z-index: 10;
      cursor: pointer;
      border: 4px solid #ffffff;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
      display: none;
    }

    .challenge-center-button:active {
      transform: translate(-50%, -50%) scale(1.15);
    }

    .challenge-center-button i {
      font-size: 2.2rem;
    }

    /* Soft pulse guidance for errors */
    .pulse-guide {
      animation: zonePulse 0.8s 2 ease-in-out;
    }

    @keyframes zonePulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.25); }
    }

    /* Glowing stars decoration background */
    .bg-glowing-star {
      position: absolute;
      color: rgba(255, 255, 255, 0.12);
      font-size: 0.8rem;
      pointer-events: none;
      animation: flashStar 3s infinite ease-in-out;
    }

    @keyframes flashStar {
      0%, 100% { opacity: 0.1; transform: scale(0.8); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }

    .loading-notice {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1.5rem 2.5rem;
      border-radius: 20px;
      text-align: center;
      z-index: 100;
      pointer-events: none;
      display: none;
    }

    .loading-notice p {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .loading-notice .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid var(--color-gold);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Floating Game Emojis */
    .glowing-emoji {
      position: absolute;
      pointer-events: none;
      font-size: 2.5rem;
      z-index: 4;
    }

    @media (max-width: 768px) {
      .stimulation-container {
        padding: 0.5rem;
      }
      .controls-panel {
        flex-direction: column;
        gap: 0.6rem;
        padding: 0.6rem;
      }
      .zone-label-card {
        padding: 0.8rem 1.6rem;
        border-radius: 20px;
      }
      .zone-half-title {
        font-size: 1.1rem;
      }
      .zone-desc {
        font-size: 0.75rem;
      }
      .challenge-center-button {
        width: 75px;
        height: 75px;
      }
      .challenge-center-button i {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-container">
      <img src="../img/logo.png" alt="Seven Keys School" class="header-logo">
    </div>
    <a href="index.html" class="btn-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Volver a Juegos
    </a>
  </header>

  <main class="stimulation-container">
    <!-- Game Mode Controls -->
    <div class="controls-panel">
      <div class="control-group">
        <span class="control-label">Juego:</span>
        <div class="btn-toggle-group">
          <button class="btn-toggle active" id="btn-mode-explore" onclick="setMode('explore')">
            <i class="fas fa-hand-pointer"></i> Explorar
          </button>
          <button class="btn-toggle" id="btn-mode-challenge" onclick="setMode('challenge')">
            <i class="fas fa-headphones"></i> El Reto del Oído
          </button>
        </div>
      </div>

      <div class="control-group">
        <span class="control-label">Sonido:</span>
        <div class="btn-toggle-group">
          <button class="btn-toggle active" id="btn-sound-chime" onclick="setSoundType('chime')">
            ✨ Campanas
          </button>
          <button class="btn-toggle" id="btn-sound-marimba" onclick="setSoundType('marimba')">
            🪵 Xilófono
          </button>
        </div>
      </div>
    </div>

    <!-- Sandbox Play Area -->
    <div class="sandbox-area" id="play-sandbox">
      <canvas id="effects-canvas"></canvas>

      <!-- Loading notice -->
      <div class="loading-notice" id="loading-notice">
        <p>Cargando sonidos reales...</p>
        <div class="spinner"></div>
      </div>

      <!-- Play Button for Challenge Mode -->
      <button class="challenge-center-button" id="btn-listen" onclick="playChallengeSound()" aria-label="Escuchar Sonido">
        <i class="fas fa-volume-up"></i>
      </button>

      <!-- Split Screen Layout -->
      <div class="split-container">
        <!-- Sky (High Note) -->
        <div class="zone-half zone-sky-half" id="zone-sky" onmousedown="onZoneTap('sky', event)" ontouchstart="onZoneTap('sky', event)">
          <!-- Vector background graphics -->
          <div class="zone-graphics">
            <svg viewBox="0 0 100 100" width="100%" height="100%" preserveAspectRatio="none" opacity="0.15">
              <path d="M0 0 L100 0 L100 90 Q 75 70, 50 90 Q 25 110, 0 90 Z" fill="#38bdf8" />
            </svg>
            <span class="bg-glowing-star" style="top: 15%; left: 12%;">⭐</span>
            <span class="bg-glowing-star" style="top: 35%; left: 45%;">⭐</span>
            <span class="bg-glowing-star" style="top: 20%; left: 78%;">⭐</span>
          </div>

          <div class="zone-label-card">
            <!-- Glowing Sun Vector -->
            <svg viewBox="0 0 100 100" width="50" height="50">
              <circle cx="50" cy="50" r="22" fill="#38bdf8" filter="drop-shadow(0 0 8px #38bdf8)" />
              <path d="M50 5 L50 18 M50 82 L50 95 M5 50 L18 50 M82 50 L95 50" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" />
            </svg>
            <h2 class="zone-half-title">El Cielo</h2>
            <span class="zone-desc">Sonido Agudo</span>
          </div>
        </div>

        <!-- Ground (Low Note) -->
        <div class="zone-half zone-ground-half" id="zone-ground" onmousedown="onZoneTap('ground', event)" ontouchstart="onZoneTap('ground', event)">
          <!-- Vector background graphics -->
          <div class="zone-graphics">
            <svg viewBox="0 0 100 100" width="100%" height="100%" preserveAspectRatio="none" opacity="0.1">
              <path d="M0 10 L100 10 L100 100 L0 100 Z" fill="#fb923c" />
            </svg>
            <span class="bg-glowing-star" style="bottom: 15%; left: 15%;">⭐</span>
            <span class="bg-glowing-star" style="bottom: 35%; left: 52%;">⭐</span>
            <span class="bg-glowing-star" style="bottom: 20%; left: 80%;">⭐</span>
          </div>

          <div class="zone-label-card">
            <!-- Mountain/Earth Wave Vector -->
            <svg viewBox="0 0 100 100" width="50" height="50">
              <path d="M10 80 L50 20 L90 80 Z" fill="none" stroke="#fb923c" stroke-width="6" stroke-linejoin="round" />
              <circle cx="50" cy="55" r="8" fill="#fb923c" />
            </svg>
            <h2 class="zone-half-title">La Tierra</h2>
            <span class="zone-desc">Sonido Grave</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // --- Audio setup ---
    const noteFiles = [
      '../music/xylophone/note1.wav', // DO4 (C4) - used for Low Grave
      '../music/xylophone/note7.wav'  // SI4 (B4) - used for High Agudo
    ];

    let audioCtx = null;
    let selectedSound = 'chime';
    let currentMode = 'explore';

    const audioBuffers = {};
    let soundsLoaded = false;
    let isLoadingSounds = false;

    // Challenge variables
    let challengeActive = false;
    let currentTarget = null; // 'sky' or 'ground'
    let isWaitingForAnswer = false;

    const zoneDetails = {
      sky: {
        noteIndex: 7, // SI4 (High)
        pitchRate: 1.25, // Shift higher for clear crystal tone
        synthFreq: 880.00, // High A5
        color: '#38bdf8'
      },
      ground: {
        noteIndex: 1, // DO4 (Low)
        pitchRate: 0.5, // Shift down one octave for deep rumble
        synthFreq: 130.81, // Low C3
        color: '#fb923c'
      }
    };

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      triggerSoundsLoading();
    }

    async function triggerSoundsLoading() {
      if (isLoadingSounds || soundsLoaded) return;
      isLoadingSounds = true;
      const notice = document.getElementById('loading-notice');
      notice.style.display = 'block';

      // Load C4 and B4 notes
      try {
        const response1 = await fetch(noteFiles[0]);
        const arrayBuffer1 = await response1.arrayBuffer();
        audioBuffers[1] = await audioCtx.decodeAudioData(arrayBuffer1);

        const response2 = await fetch(noteFiles[1]);
        const arrayBuffer2 = await response2.arrayBuffer();
        audioBuffers[7] = await audioCtx.decodeAudioData(arrayBuffer2);
        
        soundsLoaded = true;
      } catch (e) {
        console.error("Error loading note files:", e);
      }

      isLoadingSounds = false;
      notice.style.display = 'none';
    }

    function playSound(zoneKey) {
      initAudio();
      const details = zoneDetails[zoneKey];

      // If WAV buffers are loaded and Marimba/Xilofono is selected, play them!
      if (soundsLoaded && audioBuffers[details.noteIndex] && selectedSound === 'marimba') {
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffers[details.noteIndex];
        source.playbackRate.setValueAtTime(details.pitchRate, audioCtx.currentTime);
        source.connect(audioCtx.destination);
        source.start(0);
      } else {
        // High quality synthesized chime
        playSynthChime(details.synthFreq);
      }
    }

    function playSynthChime(freq) {
      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      const gainNode2 = audioCtx.createGain();
      
      osc1.connect(gainNode);
      osc2.connect(gainNode2);
      gainNode.connect(audioCtx.destination);
      gainNode2.connect(audioCtx.destination);
      
      const now = audioCtx.currentTime;
      
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(freq, now);
      
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(freq * 2.01, now);
      
      gainNode.gain.setValueAtTime(0.5, now);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
      
      gainNode2.gain.setValueAtTime(0.12, now);
      gainNode2.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
      
      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + 1.9);
      osc2.stop(now + 0.7);
    }

    // Success chime chord
    function playSuccessChime() {
      const now = audioCtx.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.50]; // DO5, MI5, SOL5, DO6 (Arpeggio)
      notes.forEach((freq, idx) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now + (idx * 0.08));
        
        gain.gain.setValueAtTime(0.3, now + (idx * 0.08));
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8 + (idx * 0.08));
        
        osc.start(now + (idx * 0.08));
        osc.stop(now + 0.9 + (idx * 0.08));
      });
    }

    // Soft wood failure chime
    function playFailChime() {
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(220.00, now); // Low A3 wood block drop
      osc.frequency.linearRampToValueAtTime(180.00, now + 0.25);
      
      gain.gain.setValueAtTime(0.4, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      
      osc.start(now);
      osc.stop(now + 0.4);
    }

    // --- Interaction Router ---
    function onZoneTap(zone, event) {
      event.preventDefault();
      
      let clientX, clientY;
      if (event.touches && event.touches[0]) {
        clientX = event.touches[0].clientX;
        clientY = event.touches[0].clientY;
      } else {
        clientX = event.clientX;
        clientY = event.clientY;
      }

      // Add touch feedback class
      const zoneEl = document.getElementById(`zone-${zone}`);
      zoneEl.classList.add('active-touch');
      setTimeout(() => zoneEl.classList.remove('active-touch'), 150);

      const details = zoneDetails[zone];

      if (currentMode === 'explore') {
        // Free exploration: play sound immediately and spawn particles
        playSound(zone);
        spawnParticles(clientX, clientY, details.color);
        spawnFloatingEmoji(clientX, clientY, zone === 'sky' ? '✨' : '🌊');
      } else {
        // Challenge Mode Answer
        if (!isWaitingForAnswer) return;
        isWaitingForAnswer = false;

        const btnListen = document.getElementById('btn-listen');

        if (zone === currentTarget) {
          // Success!
          playSuccessChime();
          
          // Visual rewards
          btnListen.style.background = '#10b981'; // Green
          btnListen.querySelector('i').className = 'fas fa-check';
          
          spawnParticles(clientX, clientY, '#10b981');
          for (let i = 0; i < 6; i++) {
            setTimeout(() => {
              spawnFloatingEmoji(clientX + (Math.random() * 80 - 40), clientY + (Math.random() * 80 - 40), zone === 'sky' ? '⭐' : '🌸');
            }, i * 50);
          }

          // Next round automatic delay
          setTimeout(() => {
            resetChallengeUI();
            playChallengeSound();
          }, 1800);
        } else {
          // Wrong choice - guide them without loud buzzers
          playFailChime();
          
          btnListen.style.background = '#ef4444'; // Red
          btnListen.querySelector('i').className = 'fas fa-volume-up';

          // Guide them by pulsing the correct zone
          const correctZoneEl = document.getElementById(`zone-${currentTarget}`);
          correctZoneEl.classList.add('pulse-guide');
          setTimeout(() => correctZoneEl.classList.remove('pulse-guide'), 1600);

          // Allow them to try again after a brief pause
          setTimeout(() => {
            btnListen.style.background = 'var(--color-gold)';
            isWaitingForAnswer = true;
          }, 1200);
        }
      }
    }

    // --- Challenge Mode Logic ---
    function setMode(modeName) {
      currentMode = modeName;
      document.getElementById('btn-mode-explore').classList.remove('active');
      document.getElementById('btn-mode-challenge').classList.remove('active');
      document.getElementById(`btn-mode-${modeName}`).classList.add('active');

      const btnListen = document.getElementById('btn-listen');

      if (modeName === 'explore') {
        btnListen.style.display = 'none';
        resetChallengeUI();
      } else {
        btnListen.style.display = 'flex';
        resetChallengeUI();
        initAudio(); // Warm up context
      }
    }

    function setSoundType(soundType) {
      selectedSound = soundType;
      document.getElementById('btn-sound-chime').classList.remove('active');
      document.getElementById('btn-sound-marimba').classList.remove('active');
      document.getElementById(`btn-sound-${soundType}`).classList.add('active');
      
      initAudio(); // Warm up
    }

    function resetChallengeUI() {
      const btnListen = document.getElementById('btn-listen');
      btnListen.style.background = 'var(--color-gold)';
      btnListen.querySelector('i').className = 'fas fa-volume-up';
      btnListen.style.transform = 'translate(-50%, -50%) scale(1)';
      isWaitingForAnswer = false;
      currentTarget = null;
    }

    function playChallengeSound() {
      if (isWaitingForAnswer) {
        // Re-play the current sound
        playSound(currentTarget);
        return;
      }
      
      resetChallengeUI();
      
      // Randomize target
      currentTarget = Math.random() > 0.5 ? 'sky' : 'ground';
      
      // Animate button
      const btn = document.getElementById('btn-listen');
      btn.style.transform = 'translate(-50%, -50%) scale(1.1)';
      setTimeout(() => btn.style.transform = 'translate(-50%, -50%) scale(1)', 200);

      // Play target sound
      playSound(currentTarget);
      
      // Enable answering
      isWaitingForAnswer = true;
    }

    // --- Particle Physics Effects Engine ---
    const canvas = document.getElementById('effects-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      const sandbox = document.getElementById('play-sandbox');
      canvas.width = sandbox.clientWidth;
      canvas.height = sandbox.clientHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 300);

    class Particle {
      constructor(x, y, color) {
        const rect = canvas.getBoundingClientRect();
        this.x = x - rect.left;
        this.y = y - rect.top;
        this.color = color;
        this.size = Math.random() * 12 + 6;
        this.speedX = Math.random() * 8 - 4;
        this.speedY = Math.random() * 8 - 4;
        this.gravity = 0.12;
        this.alpha = 1;
        this.decay = Math.random() * 0.02 + 0.015;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.speedY += this.gravity;
        this.alpha -= this.decay;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.restore();
      }
    }

    function spawnParticles(x, y, color) {
      for (let i = 0; i < 15; i++) {
        particles.push(new Particle(x, y, color));
      }
    }

    function spawnFloatingEmoji(x, y, emoji) {
      const el = document.createElement('div');
      el.className = 'glowing-emoji';
      el.innerText = emoji;
      
      const sandboxRect = document.getElementById('play-sandbox').getBoundingClientRect();
      el.style.left = `${x - sandboxRect.left}px`;
      el.style.top = `${y - sandboxRect.top}px`;
      
      document.getElementById('play-sandbox').appendChild(el);
      
      let speedY = Math.random() * -3 - 2;
      let speedX = Math.random() * 4 - 2;
      let opacity = 1;
      let scale = 1;
      let rot = 0;
      let rotSpeed = Math.random() * 10 - 5;
      
      function step() {
        speedY += 0.08;
        const curTop = parseFloat(el.style.top);
        const curLeft = parseFloat(el.style.left);
        
        el.style.top = `${curTop + speedY}px`;
        el.style.left = `${curLeft + speedX}px`;
        el.style.transform = `rotate(${rot}deg) scale(${scale})`;
        el.style.opacity = opacity;
        
        rot += rotSpeed;
        opacity -= 0.02;
        scale -= 0.01;
        
        if (opacity > 0) {
          requestAnimationFrame(step);
        } else {
          el.remove();
        }
      }
      requestAnimationFrame(step);
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        
        if (particles[i].alpha <= 0) {
          particles.splice(i, 1);
        }
      }
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
